---
layout: default
---

<article class="post">
    <header class="post-header">
        <h2 class="post-title">{{ page.title }}</h2>
        <p class="post-date">{{ page.date | date: "%Y年%m月%d日" }}</p>
    </header>
    
    <div class="post-content">
        {{ content }}
    </div>
    
    <footer class="post-footer">
        <a href="{{ '/' | relative_url }}" class="back-link">← トップページへ戻る</a>
    </footer>
</article>
