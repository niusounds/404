<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f4f1ea" stroke="#dcd7c9" stroke-width="2"/>
  
  <!-- The Door -->
  <rect x="250" y="150" width="60" height="100" fill="#000" />
  <circle cx="300" cy="200" r="2" fill="#fff" />
  
  <!-- More detailed figure -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#222" stroke-width="2.5"/>
    <circle cx="-3" cy="-2" r="1.5" fill="#f00" /> <!-- glowing eyes -->
    <circle cx="3" cy="-2" r="1.5" fill="#f00" />
    
    <path d="M 0 10 L 0 35 M 0 18 L -15 25 M 0 18 L 15 25 M 0 35 L -10 55 M 0 35 L 10 55" fill="none" stroke="#222" stroke-width="2.5" />
  </g>
  
  <path d="M 0,0 L 400,0 L 400,300 L 0,300 Z" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="2,4" opacity="0.1"/>
  
  <rect x="0" y="0" width="400" height="300" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(0,0,0);stop-opacity:0" />
      <stop offset="100%" style="stop-color:rgb(0,0,0);stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
