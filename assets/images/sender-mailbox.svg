<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="blur-light">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background wall -->
  <rect width="800" height="500" fill="#0d0d12"/>

  <!-- Wall texture -->
  <rect x="0" y="0" width="800" height="500" fill="none" stroke="#1a1a22" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#15151f" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#15151f" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#15151f" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#15151f" stroke-width="1"/>

  <!-- Faint overhead light glow -->
  <ellipse cx="400" cy="0" rx="200" ry="80" fill="#2a2a3a" opacity="0.3" filter="url(#blur-light)"/>

  <!-- Mailbox body -->
  <rect x="280" y="170" width="240" height="160" rx="6" fill="#1e2030" stroke="#2a2d45" stroke-width="2"/>
  <!-- Mailbox sheen -->
  <rect x="280" y="170" width="240" height="8" rx="6" fill="#2e3050" opacity="0.6"/>

  <!-- Mailbox slot -->
  <rect x="320" y="230" width="160" height="14" rx="3" fill="#0a0a10" stroke="#222235" stroke-width="1"/>

  <!-- Mailbox label number -->
  <text x="400" y="296" font-family="monospace" font-size="16" fill="#2a2d45" text-anchor="middle">405</text>

  <!-- Envelope sticking out of mailbox slot -->
  <g id="envelope">
    <!-- envelope body -->
    <rect x="345" y="210" width="110" height="76" rx="2" fill="#e8e2d0" stroke="#c8c0a8" stroke-width="1"/>
    <!-- envelope flap fold line -->
    <line x1="345" y1="238" x2="455" y2="238" stroke="#b8b0a0" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.6"/>
    <!-- envelope diagonal crease left -->
    <line x1="345" y1="210" x2="400" y2="235" stroke="#c0b89a" stroke-width="0.8" opacity="0.5"/>
    <!-- envelope diagonal crease right -->
    <line x1="455" y1="210" x2="400" y2="235" stroke="#c0b89a" stroke-width="0.8" opacity="0.5"/>
    <!-- faint address text lines -->
    <line x1="365" y1="252" x2="435" y2="252" stroke="#888070" stroke-width="1" opacity="0.5"/>
    <line x1="365" y1="262" x2="430" y2="262" stroke="#888070" stroke-width="1" opacity="0.5"/>
    <line x1="365" y1="272" x2="420" y2="272" stroke="#888070" stroke-width="1" opacity="0.4"/>

    <animate attributeName="opacity" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Small wall-mount screws -->
  <circle cx="290" cy="180" r="3" fill="#2a2d45"/>
  <circle cx="510" cy="180" r="3" fill="#2a2d45"/>
  <circle cx="290" cy="320" r="3" fill="#2a2d45"/>
  <circle cx="510" cy="320" r="3" fill="#2a2d45"/>

  <!-- Vignette overlay -->
  <rect width="800" height="500" fill="url(#vignette)"/>

  <!-- Faint text: 差出人なし -->
  <text x="400" y="430" font-family="serif" font-size="13" fill="#2a2d45" text-anchor="middle" opacity="0.6">差出人不明</text>
</svg>
