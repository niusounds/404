<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Dark background -->
  <rect width="800" height="500" fill="#0a0a0a"/>
  
  <!-- Desk -->
  <rect x="0" y="350" width="800" height="150" fill="#1a1a1a"/>
  
  <!-- Monitor - slightly glowing -->
  <rect x="250" y="150" width="300" height="200" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="3"/>
  
  <!-- Screen glow -->
  <rect x="260" y="160" width="280" height="180" fill="#1a1a2e">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Video call grid (dark silhouettes) -->
  <rect x="270" y="170" width="130" height="80" fill="#0a0a15" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="410" y="170" width="130" height="80" fill="#0a0a15" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="270" y="260" width="130" height="70" fill="#0a0a15" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="410" y="260" width="130" height="70" fill="#0a0a15" stroke="#2a2a3a" stroke-width="1"/>
  
  <!-- Dark figure silhouettes in windows -->
  <ellipse cx="335" cy="205" rx="20" ry="25" fill="#000000" opacity="0.7"/>
  <ellipse cx="475" cy="205" rx="20" ry="25" fill="#000000" opacity="0.7"/>
  
  <!-- Keyboard suggestion -->
  <rect x="230" y="370" width="340" height="15" fill="#151515" rx="2"/>
  <rect x="240" y="372" width="15" height="11" fill="#0a0a0a" rx="1"/>
  <rect x="258" y="372" width="15" height="11" fill="#0a0a0a" rx="1"/>
  <rect x="276" y="372" width="15" height="11" fill="#0a0a0a" rx="1"/>
  <rect x="294" y="372" width="15" height="11" fill="#0a0a0a" rx="1"/>
  <rect x="312" y="372" width="40" height="11" fill="#0a0a0a" rx="1"/>
  
  <!-- Coffee mug -->
  <rect x="620" y="360" width="50" height="60" fill="#1a1a1a" rx="3"/>
  <ellipse cx="645" cy="360" rx="25" ry="8" fill="#0d0d0d"/>
  
  <!-- Ambient darkness -->
  <rect width="800" height="500" fill="url(#darkGradient)" opacity="0.4"/>
  
  <defs>
    <radialGradient id="darkGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </radialGradient>
  </defs>
</svg>
