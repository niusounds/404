<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a0000;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowBlur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#skyGradient)" />
  <rect width="800" height="400" fill="rgba(0,0,0,0.1)" filter="url(#noise)" />
  
  <!-- Road -->
  <path d="M 0 400 L 300 250 L 500 250 L 800 400 Z" fill="#1a1a1a" />
  <path d="M 300 250 L 500 250 L 550 0 L 250 0 Z" fill="#2a2a2a" opacity="0.3" />
  
  <!-- Telegraph Pole Shadows -->
  <path d="M 100 400 L 250 320 L 260 320 L 110 400 Z" fill="#000" opacity="0.8" />
  <path d="M 600 400 L 450 320 L 440 320 L 590 400 Z" fill="#000" opacity="0.8" />
  
  <!-- The Detached Shadow -->
  <path d="M 350 350 Q 340 300 350 250 Q 360 200 370 250 Q 380 300 370 350 Z" fill="#000" filter="url(#shadowBlur)" transform="rotate(20 360 350)" />
  <ellipse cx="360" cy="350" rx="20" ry="10" fill="#000" filter="url(#shadowBlur)" />
  
  <!-- The Person (Shadowless) -->
  <g transform="translate(450, 330)">
    <!-- Simple silhouette for the person -->
    <path d="M -5 -60 L 5 -60 L 10 -30 L 5 0 L -5 0 L -10 -30 Z" fill="#311" />
    <circle cx="0" cy="-70" r="8" fill="#311" />
    <!-- No shadow at the feet -->
  </g>
</svg>
