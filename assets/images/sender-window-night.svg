<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="window-glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#f5e8c0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="800" height="500" fill="#05050e"/>

  <!-- Distant city lights background -->
  <rect x="0" y="320" width="800" height="180" fill="#080812"/>
  <!-- city skyline silhouette -->
  <rect x="50" y="340" width="30" height="140" fill="#0a0a18"/>
  <rect x="90" y="310" width="50" height="170" fill="#0c0c1a"/>
  <rect x="155" y="350" width="25" height="130" fill="#0a0a18"/>
  <rect x="200" y="290" width="70" height="190" fill="#0d0d1e"/>
  <rect x="285" y="330" width="40" height="150" fill="#0a0a18"/>
  <rect x="340" y="300" width="60" height="180" fill="#0c0c1c"/>
  <rect x="420" y="340" width="35" height="140" fill="#0a0a18"/>
  <rect x="470" y="280" width="80" height="200" fill="#0e0e20"/>
  <rect x="570" y="320" width="45" height="160" fill="#0b0b1a"/>
  <rect x="630" y="295" width="55" height="185" fill="#0d0d1e"/>
  <rect x="705" y="335" width="40" height="145" fill="#0a0a18"/>

  <!-- Apartment building - main focus -->
  <rect x="230" y="60" width="340" height="380" fill="#111120" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Building windows grid - dark ones -->
  <!-- Row 1 -->
  <rect x="260" y="90" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="335" y="90" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="410" y="90" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="485" y="90" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <!-- Row 2 -->
  <rect x="260" y="150" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="335" y="150" width="55" height="40" fill="#100e18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="410" y="150" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="485" y="150" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <!-- Row 3 - target window lit -->
  <rect x="260" y="210" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="335" y="210" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>

  <!-- THE lit window -->
  <rect x="410" y="210" width="55" height="40" fill="#c8a840" stroke="#d4b050" stroke-width="1" filter="url(#glow)">
    <animate attributeName="fill" values="#c8a840;#b89a38;#c8a840;#c0a03c;#c8a840" dur="6s" repeatCount="indefinite"/>
  </rect>
  <!-- window warm glow -->
  <rect x="410" y="210" width="55" height="40" fill="url(#window-glow)"/>
  <!-- window pane division -->
  <line x1="437" y1="210" x2="437" y2="250" stroke="#a88028" stroke-width="1" opacity="0.5"/>
  <line x1="410" y1="228" x2="465" y2="228" stroke="#a88028" stroke-width="1" opacity="0.5"/>

  <!-- Silhouette of person inside the lit window -->
  <g opacity="0.85">
    <!-- body -->
    <ellipse cx="438" cy="245" rx="8" ry="4" fill="#2a1a05"/>
    <!-- torso -->
    <rect x="433" y="228" width="10" height="17" rx="2" fill="#2a1a05"/>
    <!-- head -->
    <ellipse cx="438" cy="225" rx="6" ry="7" fill="#2a1a05"/>
    <!-- faint breathing animate -->
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-1;0,0" dur="4s" repeatCount="indefinite"/>
  </g>

  <rect x="485" y="210" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <!-- Row 4 -->
  <rect x="260" y="270" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="335" y="270" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="410" y="270" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="485" y="270" width="55" height="40" fill="#0f0e1a" stroke="#1a1a28" stroke-width="1"/>
  <!-- Row 5 -->
  <rect x="260" y="330" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="335" y="330" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="410" y="330" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>
  <rect x="485" y="330" width="55" height="40" fill="#0d0d18" stroke="#1a1a28" stroke-width="1"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="150" cy="25" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="220" cy="50" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="590" cy="30" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="680" cy="50" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="730" cy="20" r="1" fill="#ffffff" opacity="0.4"/>

  <!-- Vignette -->
  <rect width="800" height="500" fill="url(#vignette)"/>

  <!-- Faint caption -->
  <text x="400" y="460" font-family="serif" font-size="12" fill="#2a2a40" text-anchor="middle" opacity="0.7">カーテン、閉め忘れていましたよ</text>
</svg>
