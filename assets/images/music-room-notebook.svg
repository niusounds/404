<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <filter id="paper-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="480" fill="#080808"/>

  <!-- Notebook page - left (adult handwriting - normal entries) -->
  <rect x="40" y="30" width="330" height="420" fill="#e8e0cc" rx="2" filter="url(#paper-texture)"/>
  <!-- Notebook spine shadow -->
  <rect x="368" y="30" width="8" height="420" fill="#1a1410"/>
  <!-- Notebook page - right (changed handwriting) -->
  <rect x="376" y="30" width="384" height="420" fill="#e4dcc8" rx="2" filter="url(#paper-texture)"/>

  <!-- Ruled lines - left page -->
  <line x1="55" y1="80" x2="360" y2="80" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="105" x2="360" y2="105" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="130" x2="360" y2="130" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="155" x2="360" y2="155" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="180" x2="360" y2="180" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="205" x2="360" y2="205" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="230" x2="360" y2="230" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="255" x2="360" y2="255" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="280" x2="360" y2="280" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="305" x2="360" y2="305" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="330" x2="360" y2="330" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="355" x2="360" y2="355" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="380" x2="360" y2="380" stroke="#c8bda8" stroke-width="0.8"/>
  <line x1="55" y1="405" x2="360" y2="405" stroke="#c8bda8" stroke-width="0.8"/>

  <!-- Left page date -->
  <text x="260" y="62" font-family="serif" font-size="11" fill="#2a2520">2025年11月7日</text>

  <!-- Left page - adult handwriting (normal, controlled, slightly hurried) -->
  <text x="58" y="98" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">今夜、行く。もうわかっている。</text>
  <text x="58" y="123" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">篠原氏が最後に言ったこと。</text>
  <text x="58" y="148" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">「名前を書き留めておきなさい」</text>
  <text x="58" y="173" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">松田氏のメール。八名分の名前。</text>
  <text x="58" y="198" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">床板の下に、何かある。</text>
  <text x="58" y="223" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">道具を持っていく。懐中電灯、</text>
  <text x="58" y="248" font-family="serif" font-size="11" fill="#1a1510" filter="url(#inkBlur)">バール、カメラ。</text>

  <!-- Line becoming shakier -->
  <text x="58" y="273" font-family="serif" font-size="11" fill="#1a1510">名前を、書いておかなければ</text>
  <!-- Very slightly shaky -->
  <text x="58" y="298" font-family="serif" font-size="11.5" fill="#0d0d08" transform="rotate(0.3, 58, 298)">私の　名前は</text>
  <!-- Noticeably shaky, larger -->
  <text x="58" y="328" font-family="serif" font-size="13" fill="#0a0a06" transform="rotate(-0.8, 58, 328)" letter-spacing="1">田中　　広</text>

  <!-- Horizontal rule dividing adult from child handwriting -->
  <line x1="55" y1="345" x2="360" y2="345" stroke="#4a3020" stroke-width="1.5" opacity="0.6"/>

  <!-- Child-like handwriting begins - larger, rounder, uneven -->
  <text x="58" y="372" font-family="sans-serif" font-size="17" fill="#3a2515" letter-spacing="3" transform="rotate(1.5, 58, 372)">たなか　ひろし</text>
  <text x="58" y="402" font-family="sans-serif" font-size="16" fill="#3a2515" letter-spacing="4" transform="rotate(-1, 58, 402)">あなた　の</text>
  <text x="58" y="430" font-family="sans-serif" font-size="16" fill="#3a2515" letter-spacing="3" transform="rotate(0.7, 58, 430)">なまえは</text>

  <!-- Right page - ruled lines -->
  <line x1="390" y1="80" x2="748" y2="80" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="105" x2="748" y2="105" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="130" x2="748" y2="130" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="155" x2="748" y2="155" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="180" x2="748" y2="180" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="205" x2="748" y2="205" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="230" x2="748" y2="230" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="255" x2="748" y2="255" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="280" x2="748" y2="280" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="305" x2="748" y2="305" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="330" x2="748" y2="330" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="355" x2="748" y2="355" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="380" x2="748" y2="380" stroke="#c0b498" stroke-width="0.8"/>
  <line x1="390" y1="405" x2="748" y2="405" stroke="#c0b498" stroke-width="0.8"/>

  <!-- Right page - all child handwriting, larger, rounder, uneven baseline -->
  <text x="393" y="62" font-family="sans-serif" font-size="11" fill="#2a2218">（右頁、判読困難。以下、解読範囲）</text>

  <text x="393" y="98" font-family="sans-serif" font-size="18" fill="#2a1a0a" letter-spacing="3" transform="rotate(2, 393, 98)">なまえ</text>
  <text x="393" y="128" font-family="sans-serif" font-size="18" fill="#2a1a0a" letter-spacing="2" transform="rotate(-1.5, 393, 128)">なまえ</text>
  <text x="393" y="158" font-family="sans-serif" font-size="18" fill="#2a1a0a" letter-spacing="2" transform="rotate(1, 393, 158)">なまえ</text>
  <text x="393" y="188" font-family="sans-serif" font-size="18" fill="#261808" letter-spacing="2" transform="rotate(-0.5, 393, 188)">なまえ</text>
  <text x="393" y="218" font-family="sans-serif" font-size="18" fill="#261808" letter-spacing="2" transform="rotate(1.5, 393, 218)">なまえ</text>
  <text x="393" y="248" font-family="sans-serif" font-size="17" fill="#1e1205" letter-spacing="3" transform="rotate(-1, 393, 248)">なまえ</text>
  <text x="393" y="278" font-family="sans-serif" font-size="17" fill="#1e1205" letter-spacing="3" transform="rotate(0.8, 393, 278)">なまえ</text>
  <text x="393" y="308" font-family="sans-serif" font-size="17" fill="#1e1205" letter-spacing="3" transform="rotate(-0.5, 393, 308)">なまえ</text>

  <!-- Getting desperate, bigger -->
  <text x="393" y="345" font-family="sans-serif" font-size="22" fill="#160e02" letter-spacing="4" transform="rotate(2, 393, 345)">なまえ</text>
  <text x="393" y="380" font-family="sans-serif" font-size="22" fill="#120a00" letter-spacing="5" transform="rotate(-2, 393, 380)">なまえ</text>

  <!-- Final line - bigger, darker, almost violent press -->
  <text x="393" y="430" font-family="sans-serif" font-size="28" fill="#0d0600" letter-spacing="5" transform="rotate(1, 393, 430)" font-weight="bold">なまえ？</text>

  <!-- Ink blot near bottom right -->
  <ellipse cx="680" cy="440" rx="15" ry="8" fill="#0a0600" opacity="0.7"/>
  <ellipse cx="700" cy="445" rx="5" ry="3" fill="#0a0600" opacity="0.4"/>
  <ellipse cx="665" cy="448" rx="3" ry="2" fill="#0a0600" opacity="0.3"/>

  <!-- Vignette around edges -->
  <radialGradient id="notebookVignette" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="800" height="480" fill="url(#notebookVignette)"/>
</svg>
