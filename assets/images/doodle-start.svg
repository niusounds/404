<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f4f1ea" stroke="#dcd7c9" stroke-width="2"/>
  <line x1="40" y1="40" x2="360" y2="40" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="80" x2="360" y2="80" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="120" x2="360" y2="120" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="160" x2="360" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="200" x2="200" y2="200" stroke="#ccc" stroke-width="1"/>
  
  <!-- Stick figure -->
  <g transform="translate(320, 240) rotate(5)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="8" x2="0" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="15" x2="-10" y2="5" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="15" x2="10" y2="5" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="30" x2="-8" y2="45" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="30" x2="8" y2="45" stroke="#333" stroke-width="2"/>
  </g>
  
  <rect x="0" y="0" width="400" height="300" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(0,0,0);stop-opacity:0" />
      <stop offset="100%" style="stop-color:rgb(0,0,0);stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
