<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <radialGradient id="door-glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#1a1a30" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background hallway -->
  <rect width="800" height="500" fill="#070710"/>

  <!-- Floor -->
  <polygon points="0,500 800,500 650,340 150,340" fill="#0c0c18"/>
  <!-- Floor lines perspective -->
  <line x1="400" y1="340" x2="400" y2="500" stroke="#131320" stroke-width="1"/>
  <line x1="300" y1="340" x2="0" y2="500" stroke="#131320" stroke-width="1"/>
  <line x1="500" y1="340" x2="800" y2="500" stroke="#131320" stroke-width="1"/>

  <!-- Ceiling -->
  <polygon points="0,0 800,0 650,160 150,160" fill="#0a0a18"/>

  <!-- Door frame shadow -->
  <rect x="270" y="100" width="260" height="340" rx="4" fill="#050510" filter="url(#blur)"/>

  <!-- Door -->
  <rect x="280" y="110" width="240" height="330" rx="3" fill="#111128" stroke="#1e1e38" stroke-width="2"/>

  <!-- Door panels (recessed) -->
  <rect x="300" y="130" width="200" height="100" rx="2" fill="#0d0d22" stroke="#191932" stroke-width="1"/>
  <rect x="300" y="245" width="200" height="90" rx="2" fill="#0d0d22" stroke="#191932" stroke-width="1"/>
  <rect x="300" y="350" width="200" height="70" rx="2" fill="#0d0d22" stroke="#191932" stroke-width="1"/>

  <!-- Doorknob -->
  <circle cx="498" cy="278" r="10" fill="#1a1a35" stroke="#252545" stroke-width="1.5"/>
  <circle cx="498" cy="278" r="5" fill="#141430" stroke="#202040" stroke-width="1"/>

  <!-- Door bottom gap with light from inside -->
  <rect x="280" y="436" width="240" height="4" rx="1" fill="#1a1535" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.5;0.8;0.9;0.8" dur="5s" repeatCount="indefinite"/>
  </rect>
  <!-- Light leak under door -->
  <ellipse cx="400" cy="442" rx="110" ry="8" fill="#2a2050" opacity="0.3" filter="url(#blur)">
    <animate attributeName="opacity" values="0.3;0.2;0.3;0.35;0.3" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- THE ENVELOPE being slipped under the door -->
  <g id="envelope">
    <!-- envelope sticking out from under door -->
    <rect x="345" y="425" width="110" height="58" rx="2" fill="#e4dece" stroke="#c8c0aa" stroke-width="1">
      <animate attributeName="y" values="425;422;425" dur="8s" repeatCount="indefinite"/>
    </rect>
    <!-- envelope address lines -->
    <line x1="362" y1="445" x2="438" y2="445" stroke="#808070" stroke-width="1" opacity="0.6"/>
    <line x1="362" y1="455" x2="432" y2="455" stroke="#808070" stroke-width="1" opacity="0.5"/>
    <line x1="362" y1="465" x2="425" y2="465" stroke="#808070" stroke-width="1" opacity="0.4"/>
    <!-- envelope fold lines -->
    <line x1="345" y1="425" x2="400" y2="448" stroke="#b8b0a0" stroke-width="0.8" opacity="0.4"/>
    <line x1="455" y1="425" x2="400" y2="448" stroke="#b8b0a0" stroke-width="0.8" opacity="0.4"/>

    <animate attributeName="opacity" values="1;0.9;1" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Hallway side walls perspective -->
  <polygon points="150,160 0,0 0,500 150,340" fill="#080812"/>
  <polygon points="650,160 800,0 800,500 650,340" fill="#080812"/>

  <!-- Very faint shadow of someone outside door (just barely visible) -->
  <ellipse cx="400" cy="120" rx="30" ry="60" fill="#0a0a20" opacity="0.4" filter="url(#blur)"/>

  <!-- Vignette -->
  <rect width="800" height="500" fill="url(#vignette)"/>

  <!-- Faint red glow hint at envelope edges -->
  <rect x="345" y="435" width="110" height="3" fill="#400020" opacity="0.15" filter="url(#blur)"/>

  <text x="400" y="490" font-family="serif" font-size="11" fill="#252540" text-anchor="middle" opacity="0.6">今は、もうすぐです</text>
</svg>
