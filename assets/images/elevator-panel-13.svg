<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <!-- パネル背景 -->
  <rect x="100" y="20" width="120" height="140" fill="#222" stroke="#444" stroke-width="4" rx="10" />
  
  <!-- デジタル表示窓 -->
  <rect x="120" y="40" width="80" height="60" fill="#111" stroke="#333" stroke-width="2" />
  
  <!-- 異常な「13」の数字 -->
  <text x="160" y="85" font-family="monospace" font-size="44" fill="#f00" text-anchor="middle" font-weight="bold">13</text>
  
  <!-- 赤い光による異常性の強調 -->
  <rect x="120" y="40" width="80" height="60" fill="#f00" opacity="0.05" />
  
  <!-- ボタン -->
  <circle cx="160" cy="120" r="10" fill="#444" stroke="#666" stroke-width="1" />
  <circle cx="160" cy="140" r="10" fill="#444" stroke="#666" stroke-width="1" />
</svg>
