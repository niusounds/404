<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#050510"/>
  <defs>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a00" stop-opacity="0.8"><animate attributeName="stop-opacity" values="0.8;0.3;0.9;0.8" dur="2s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Shadow on wall -->
  <path d="M 200,600 C 250,400 300,200 600,100 C 650,50 700,150 650,250 C 600,350 500,500 450,600 Z" fill="#000" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,20; -20,0; 0,20" dur="6s" repeatCount="indefinite"/>
  </path>
  <circle cx="580" cy="180" r="5" fill="#f00" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Desk -->
  <polygon points="0,500 800,480 800,600 0,600" fill="#111"/>
  <!-- Glow -->
  <circle cx="300" cy="380" r="200" fill="url(#glow2)"/>
  <!-- Speaker -->
  <rect x="250" y="300" width="100" height="150" rx="15" fill="#151515"/>
  <ellipse cx="300" cy="320" rx="40" ry="10" fill="none" stroke="#f00" stroke-width="4">
    <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </ellipse>
</svg>
