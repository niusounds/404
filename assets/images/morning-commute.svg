<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Gradient for perfect morning -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0e0e6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#skyGrad)"/>
  
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#666"/>
  
  <!-- Buildings - geometrically perfect -->
  <rect x="50" y="200" width="120" height="200" fill="#555"/>
  <rect x="200" y="150" width="100" height="250" fill="#444"/>
  <rect x="330" y="180" width="130" height="220" fill="#555"/>
  <rect x="500" y="160" width="110" height="240" fill="#444"/>
  <rect x="640" y="190" width="120" height="210" fill="#555"/>
  
  <!-- Windows - all identical, glowing slightly -->
  <g opacity="0.8">
    <rect x="60" y="220" width="15" height="20" fill="#ffff99"/>
    <rect x="85" y="220" width="15" height="20" fill="#ffff99"/>
    <rect x="110" y="220" width="15" height="20" fill="#ffff99"/>
    <rect x="135" y="220" width="15" height="20" fill="#ffff99"/>
    <rect x="60" y="260" width="15" height="20" fill="#ffff99"/>
    <rect x="85" y="260" width="15" height="20" fill="#ffff99"/>
    <rect x="110" y="260" width="15" height="20" fill="#ffff99"/>
    <rect x="135" y="260" width="15" height="20" fill="#ffff99"/>
  </g>
  
  <!-- Person silhouette - walking perfectly straight -->
  <ellipse cx="400" cy="360" rx="30" ry="40" fill="#1a1a1a"/>
  <circle cx="400" cy="340" r="25" fill="#d4a574"/>
  <rect x="385" y="400" width="12" height="50" fill="#1a1a1a"/>
  <rect x="403" y="400" width="12" height="50" fill="#1a1a1a"/>
  
  <!-- Briefcase -->
  <rect x="430" y="380" width="35" height="25" fill="#3a3a3a"/>
  <line x1="415" y1="392" x2="430" y2="392" stroke="#3a3a3a" stroke-width="3"/>
  
  <!-- Grid overlay - subtle, suggesting system control -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#00ff88" stroke-width="0.5" opacity="0.08"/>
  
  <!-- Glitchy elements - very subtle -->
  <rect x="380" y="340" width="40" height="3" fill="#00ff88" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Sun - too perfect circle -->
  <circle cx="700" cy="80" r="50" fill="#ffff00" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Status text at bottom -->
  <text x="400" y="490" font-family="monospace" font-size="8" fill="#00ff88" opacity="0.06" text-anchor="middle">
    HAPPINESS_LEVEL: 100% | DOUBT: 0% | SYSTEM: ACTIVE
  </text>
</svg>
