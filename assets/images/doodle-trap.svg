<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f4f1ea" stroke="#dcd7c9" stroke-width="2"/>
  
  <!-- Black liquid spill -->
  <path d="M 150,150 Q 180,100 220,150 T 300,160 L 400,300 L 0,300 Z" fill="#000" />
  
  <!-- Ink hand reaching out -->
  <g transform="translate(200, 150) rotate(-20)">
    <path d="M 0,0 Q 10,60 0,100" stroke="#000" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M -5,100 Q -15,120 -20,130" stroke="#000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 0,100 Q 0,125 5,140" stroke="#000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 5,100 Q 15,120 25,135" stroke="#000" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Distorted text lines -->
  <line x1="40" y1="40" x2="360" y2="40" stroke="#666" stroke-width="1" stroke-dasharray="10,5"/>
  <line x1="40" y1="70" x2="300" y2="70" stroke="#666" stroke-width="1" stroke-dasharray="15,2"/>
  <line x1="40" y1="100" x2="340" y2="100" stroke="#666" stroke-width="1"/>

  <rect x="0" y="0" width="400" height="300" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(0,0,0);stop-opacity:0" />
      <stop offset="100%" style="stop-color:rgb(0,0,0);stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
