<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowBlur">
      <feGaussianBlur stdDeviation="8" result="blur"/>
    </filter>
  </defs>
  
  <!-- Dark Room -->
  <rect width="800" height="400" fill="#050505" />
  
  <!-- Moonlight / Window Light -->
  <path d="M 100 0 L 300 0 L 400 400 L 0 400 Z" fill="#1a1a2e" opacity="0.4" />
  
  <!-- Bed Outline -->
  <rect x="400" y="250" width="350" height="100" fill="#111" stroke="#222" />
  <path d="M 400 250 L 750 250 L 750 280 L 400 280 Z" fill="#1a1a1a" />
  
  <!-- Crawling Shadow -->
  <path d="M 50 380 Q 150 350 250 370 Q 300 380 400 350 Q 450 300 500 280" stroke="#000" stroke-width="40" fill="none" filter="url(#shadowBlur)" opacity="0.9" />
  <circle cx="500" cy="270" r="25" fill="#000" filter="url(#shadowBlur)" />
  
  <!-- Reaching 'fingers' of shadow -->
  <path d="M 480 280 Q 460 260 450 240" stroke="#000" stroke-width="10" fill="none" filter="url(#shadowBlur)" />
  <path d="M 500 260 Q 520 240 540 230" stroke="#000" stroke-width="10" fill="none" filter="url(#shadowBlur)" />
</svg>
