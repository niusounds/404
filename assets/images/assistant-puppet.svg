<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Puppet strings from above -->
  <line x1="300" y1="0" x2="340" y2="200" stroke="#4a9eff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="y2" values="200;205;200" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="400" y1="0" x2="400" y2="180" stroke="#4a9eff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="y2" values="180;185;180" dur="2.8s" repeatCount="indefinite"/>
  </line>
  <line x1="500" y1="0" x2="460" y2="200" stroke="#4a9eff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="y2" values="200;205;200" dur="3.2s" repeatCount="indefinite"/>
  </line>
  <line x1="350" y1="0" x2="360" y2="280" stroke="#4a9eff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="y2" values="280;285;280" dur="2.9s" repeatCount="indefinite"/>
  </line>
  <line x1="450" y1="0" x2="440" y2="280" stroke="#4a9eff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="y2" values="280;285;280" dur="3.1s" repeatCount="indefinite"/>
  </line>
  
  <!-- Human silhouette -->
  <g opacity="0.9">
    <!-- Head -->
    <ellipse cx="400" cy="200" rx="40" ry="50" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2"/>
    
    <!-- Eyes - empty, lifeless -->
    <circle cx="385" cy="195" r="5" fill="#000000"/>
    <circle cx="415" cy="195" r="5" fill="#000000"/>
    
    <!-- Body -->
    <rect x="370" y="250" width="60" height="120" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="5"/>
    
    <!-- Arms - hanging limply -->
    <rect x="320" y="260" width="50" height="15" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="3">
      <animateTransform attributeName="transform" type="rotate" values="-5 370 267; -8 370 267; -5 370 267" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="430" y="260" width="50" height="15" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="3">
      <animateTransform attributeName="transform" type="rotate" values="5 430 267; 8 430 267; 5 430 267" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Lower arms -->
    <rect x="310" y="275" width="15" height="60" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="3">
      <animateTransform attributeName="transform" type="rotate" values="0 325 275; -3 325 275; 0 325 275" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="475" y="275" width="15" height="60" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="3">
      <animateTransform attributeName="transform" type="rotate" values="0 475 275; 3 475 275; 0 475 275" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Legs -->
    <rect x="375" y="370" width="20" height="80" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="3"/>
    <rect x="405" y="370" width="20" height="80" fill="#1a1a3e" stroke="#4a9eff" stroke-width="2" rx="3"/>
  </g>
  
  <!-- Inside the body - a small figure trapped -->
  <g opacity="0.8">
    <circle cx="400" cy="310" r="25" fill="#000000" stroke="#ff4a4a" stroke-width="1" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Small trapped person inside -->
    <ellipse cx="400" cy="305" rx="8" ry="10" fill="#ff4a4a" opacity="0.6"/>
    <line x1="400" y1="315" x2="400" y2="325" stroke="#ff4a4a" stroke-width="2" opacity="0.6"/>
    <line x1="395" y1="318" x2="405" y2="318" stroke="#ff4a4a" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Small hands pressing against the barrier -->
    <circle cx="390" cy="310" r="2" fill="#ff4a4a" opacity="0.7">
      <animate attributeName="cx" values="390;388;390" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="410" cy="310" r="2" fill="#ff4a4a" opacity="0.7">
      <animate attributeName="cx" values="410;412;410" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Digital code flowing through the strings -->
  <g opacity="0.5">
    <text font-family="monospace" font-size="8" fill="#4a9eff">
      <textPath href="#string1">
        01001000
        <animate attributeName="startOffset" values="0%;100%" dur="5s" repeatCount="indefinite"/>
      </textPath>
    </text>
  </g>
  <path id="string1" d="M 300 0 L 340 200" fill="none"/>
  
  <!-- Shadow below - distorted -->
  <ellipse cx="400" cy="480" rx="80" ry="20" fill="#000000" opacity="0.5">
    <animate attributeName="rx" values="80;85;80" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Control bar at top (puppeteer's cross) -->
  <rect x="250" y="20" width="300" height="10" fill="#4a9eff" opacity="0.8"/>
  <rect x="395" y="10" width="10" height="30" fill="#4a9eff" opacity="0.8"/>
  
  <!-- Glowing effect around the figure -->
  <ellipse cx="400" cy="300" rx="100" ry="180" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>
