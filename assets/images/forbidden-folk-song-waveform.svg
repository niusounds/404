<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">録音された波形と祭りの灯</title>
  <desc id="desc">暗い海辺で録音アプリの波形が不自然に脈打つ不気味な情景</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050a"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <circle cx="980" cy="140" r="42" fill="#b7c6d6" opacity="0.15"/>

  <path d="M0 520 Q 180 490 320 525 T 620 520 T 900 535 T 1200 510 L1200 700 L0 700 Z" fill="#090d16"/>

  <g opacity="0.8">
    <circle cx="170" cy="430" r="5" fill="#ff6b6b">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="410" r="4" fill="#ff8a5b">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="265" cy="440" r="5" fill="#ff6b6b">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="360" y="160" width="480" height="320" rx="18" fill="#0e1522" stroke="#2a3b57" stroke-width="2"/>
  <rect x="390" y="200" width="420" height="220" rx="10" fill="#07101d"/>

  <polyline points="400,315 430,314 460,298 490,330 520,302 550,312 580,281 610,348 640,305 670,319 700,292 730,334 760,300 790,314"
    fill="none" stroke="#66d9ff" stroke-width="3" filter="url(#glow)">
    <animate attributeName="points"
      values="400,315 430,314 460,298 490,330 520,302 550,312 580,281 610,348 640,305 670,319 700,292 730,334 760,300 790,314;
              400,315 430,312 460,289 490,341 520,300 550,310 580,270 610,358 640,296 670,328 700,282 730,344 760,296 790,318;
              400,315 430,314 460,298 490,330 520,302 550,312 580,281 610,348 640,305 670,319 700,292 730,334 760,300 790,314"
      dur="3.2s" repeatCount="indefinite"/>
  </polyline>

  <text x="410" y="240" fill="#9eb4ce" font-size="20" font-family="serif">REC 03:17</text>
  <text x="410" y="390" fill="#6f89a8" font-size="16" font-family="serif">voice_unk_07.wav</text>
</svg>
