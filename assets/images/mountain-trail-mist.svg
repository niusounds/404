<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="fogGrad" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#c8c0b0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c8c0b0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="#1a1810"/>

  <!-- Distant trees (blurry, ghostlike) -->
  <g filter="url(#blur3)" opacity="0.4">
    <rect x="0" y="160" width="30" height="340" fill="#0d0d0a"/>
    <rect x="25" y="130" width="22" height="370" fill="#0d0d0a"/>
    <rect x="60" y="150" width="28" height="350" fill="#0d0d0a"/>
    <rect x="100" y="120" width="18" height="380" fill="#0d0d0a"/>
    <rect x="680" y="140" width="30" height="360" fill="#0d0d0a"/>
    <rect x="720" y="120" width="25" height="380" fill="#0d0d0a"/>
    <rect x="760" y="150" width="40" height="350" fill="#0d0d0a"/>
  </g>

  <!-- Mid trees -->
  <g filter="url(#blur2)" opacity="0.6">
    <rect x="50" y="180" width="35" height="320" fill="#0a0a08"/>
    <rect x="130" y="160" width="28" height="340" fill="#0a0a08"/>
    <rect x="200" y="190" width="20" height="310" fill="#0a0a08"/>
    <rect x="560" y="170" width="32" height="330" fill="#0a0a08"/>
    <rect x="630" y="155" width="26" height="345" fill="#0a0a08"/>
    <rect x="700" y="185" width="36" height="315" fill="#0a0a08"/>
  </g>

  <!-- Near trees left -->
  <g filter="url(#blur1)">
    <rect x="-10" y="200" width="50" height="300" fill="#070706"/>
    <rect x="80" y="180" width="40" height="320" fill="#070706"/>
    <rect x="170" y="205" width="35" height="295" fill="#070706"/>
    <!-- Branches -->
    <line x1="25" y1="220" x2="-20" y2="200" stroke="#070706" stroke-width="8"/>
    <line x1="25" y1="250" x2="70" y2="230" stroke="#070706" stroke-width="6"/>
    <line x1="100" y1="200" x2="55" y2="185" stroke="#070706" stroke-width="7"/>
    <line x1="100" y1="230" x2="145" y2="210" stroke="#070706" stroke-width="5"/>
  </g>

  <!-- Near trees right -->
  <g filter="url(#blur1)">
    <rect x="580" y="195" width="45" height="305" fill="#070706"/>
    <rect x="670" y="180" width="38" height="320" fill="#070706"/>
    <rect x="755" y="210" width="55" height="290" fill="#070706"/>
    <!-- Branches -->
    <line x1="602" y1="215" x2="555" y2="200" stroke="#070706" stroke-width="8"/>
    <line x1="602" y1="245" x2="648" y2="225" stroke="#070706" stroke-width="6"/>
    <line x1="689" y1="200" x2="735" y2="188" stroke="#070706" stroke-width="7"/>
  </g>

  <!-- Ground / path -->
  <path d="M340 500 L380 500 L430 350 L370 350 Z" fill="#2a2620"/>
  <path d="M300 500 L500 500 L480 380 L320 380 Z" fill="#221e1a"/>
  <path d="M280 500 L520 500 L500 420 L300 420 Z" fill="#1c1814"/>

  <!-- Path highlights -->
  <path d="M360 500 L400 500 L420 420 L360 420 Z" fill="#2e2a24" opacity="0.5"/>

  <!-- Mist / fog layers -->
  <rect x="0" y="300" width="800" height="100" fill="#c8c0b0" opacity="0.06" filter="url(#blur2)"/>
  <rect x="0" y="280" width="800" height="80" fill="#c8c0b0" opacity="0.04" filter="url(#blur3)"/>
  <ellipse cx="400" cy="340" rx="350" ry="60" fill="#c8c0b0" opacity="0.08" filter="url(#blur2)"/>
  <ellipse cx="400" cy="300" rx="300" ry="50" fill="#c8c0b0" opacity="0.05" filter="url(#blur3)"/>

  <!-- Central radial fog (path end) -->
  <ellipse cx="400" cy="360" rx="120" ry="40" fill="url(#fogGrad)" filter="url(#blur2)">
    <animate attributeName="opacity" values="0.8;0.5;0.8" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- A faint silhouette far on the path -->
  <g opacity="0.3" filter="url(#blur2)">
    <ellipse cx="400" cy="345" rx="8" ry="20" fill="#3a3530"/>
    <ellipse cx="400" cy="325" rx="6" ry="6" fill="#3a3530"/>
    <animate attributeName="opacity" values="0.3;0.15;0.3" dur="6s" repeatCount="indefinite"/>
  </g>

  <!-- Top fog / canopy darkness -->
  <rect x="0" y="0" width="800" height="200" fill="#0a0a08" opacity="0.7"/>
  <rect x="0" y="150" width="800" height="80" fill="#0a0a08" opacity="0.4" filter="url(#blur1)"/>
</svg>
