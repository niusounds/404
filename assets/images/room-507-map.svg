<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="380" fill="#070a0e"/>

  <!-- Title -->
  <text x="300" y="32" fill="#445566" font-size="12" font-family="monospace" text-anchor="middle">花咲荘ケアホーム　五号棟　平面図（1978年原本）</text>

  <!-- Corridor line -->
  <rect x="60" y="160" width="400" height="60" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <!-- Corridor label -->
  <text x="260" y="197" fill="#334455" font-size="11" font-family="monospace" text-anchor="middle">廊　下</text>

  <!-- Room 501 -->
  <rect x="60" y="80" width="70" height="80" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="95" y="125" fill="#445566" font-size="11" font-family="monospace" text-anchor="middle">501</text>

  <!-- Room 502 -->
  <rect x="130" y="80" width="70" height="80" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="165" y="125" fill="#445566" font-size="11" font-family="monospace" text-anchor="middle">502</text>

  <!-- Room 503 -->
  <rect x="200" y="80" width="70" height="80" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="235" y="125" fill="#445566" font-size="11" font-family="monospace" text-anchor="middle">503</text>

  <!-- Room 504 -->
  <rect x="270" y="80" width="70" height="80" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="305" y="125" fill="#445566" font-size="11" font-family="monospace" text-anchor="middle">504</text>

  <!-- Room 505 -->
  <rect x="340" y="80" width="70" height="80" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="375" y="125" fill="#445566" font-size="11" font-family="monospace" text-anchor="middle">505</text>

  <!-- Wall at end of corridor (current map) -->
  <rect x="460" y="155" width="10" height="70" fill="#2a3a4a"/>

  <!-- Sealed section beyond 505 -->
  <rect x="410" y="100" width="90" height="120" fill="#1a0505" stroke="#4a1010" stroke-width="1"/>
  <!-- Red cross-hatch -->
  <line x1="410" y1="100" x2="500" y2="220" stroke="#3a0808" stroke-width="1.2"/>
  <line x1="500" y1="100" x2="410" y2="220" stroke="#3a0808" stroke-width="1.2"/>
  <line x1="410" y1="140" x2="460" y2="100" stroke="#3a0808" stroke-width="0.7"/>
  <line x1="460" y1="220" x2="500" y2="180" stroke="#3a0808" stroke-width="0.7"/>

  <!-- Room 507 faint outline within sealed area -->
  <rect x="415" y="105" width="80" height="80" fill="none" stroke="#5a1515" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="455" y="142" fill="#7a2020" font-size="11" font-family="monospace" text-anchor="middle" filter="url(#redglow)">507</text>
  <text x="455" y="158" fill="#5a1515" font-size="9" font-family="monospace" text-anchor="middle">倉庫（施錠）</text>

  <!-- "Wall added" annotation -->
  <line x1="410" y1="160" x2="410" y2="220" stroke="#7a2020" stroke-width="2.5"/>
  <text x="390" y="275" fill="#8a2525" font-size="10" font-family="monospace" text-anchor="middle" filter="url(#redglow)">←壁（1987年打設）</text>
  <line x1="408" y1="190" x2="360" y2="268" stroke="#5a1515" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Flickering red glow over sealed area -->
  <rect x="410" y="100" width="90" height="120" fill="#8b0000" opacity="0.05">
    <animate attributeName="opacity" values="0.05;0.12;0.04;0.09;0.05" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Legend -->
  <rect x="60" y="300" width="12" height="12" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="80" y="311" fill="#334455" font-size="10" font-family="monospace">現存区画</text>
  <rect x="160" y="300" width="12" height="12" fill="#1a0505" stroke="#4a1010" stroke-width="1"/>
  <text x="180" y="311" fill="#7a2020" font-size="10" font-family="monospace">封鎖区画（1987年以降）</text>

  <!-- Note at bottom -->
  <text x="300" y="350" fill="#223344" font-size="10" font-family="monospace" text-anchor="middle">※ 現行図面には五〇七号室の記載なし</text>

  <animate xlink:href="#glow" attributeName="stdDeviation" values="2.5;3.5;2.5" dur="4s" repeatCount="indefinite"/>
</svg>
