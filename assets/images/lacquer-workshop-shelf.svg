<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" width="500" height="360">
  <defs>
    <radialGradient id="roomLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1a1008" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="ambientBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background - dark workshop -->
  <rect width="500" height="360" fill="#040305"/>

  <!-- Back wall -->
  <rect x="0" y="0" width="500" height="300" fill="#060407"/>

  <!-- Floor line suggestion -->
