<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="officeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f5f5f5"/>
  
  <!-- Window with too-perfect light -->
  <rect x="550" y="50" width="200" height="300" fill="#ffffff" opacity="0.9"/>
  <rect x="555" y="55" width="190" height="290" fill="#ffffdd">
    <animate attributeName="opacity" values="0.95;1;0.95" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Desk -->
  <rect x="100" y="350" width="400" height="20" fill="#8b7355"/>
  <rect x="110" y="370" width="380" height="130" fill="#6b5345"/>
  
  <!-- Computer monitor - too perfect -->
  <rect x="200" y="250" width="200" height="120" fill="#1a1a2e"/>
  <rect x="210" y="260" width="180" height="100" fill="#00ff88" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Person silhouette with uncanny smile -->
  <ellipse cx="450" cy="280" rx="35" ry="45" fill="#2d2d2d"/>
  <ellipse cx="450" cy="250" rx="30" ry="35" fill="#d4a574"/>
  
  <!-- Eyes - unnaturally bright -->
  <circle cx="440" cy="245" r="3" fill="#000"/>
  <circle cx="460" cy="245" r="3" fill="#000"/>
  <circle cx="440" cy="245" r="1.5" fill="#fff">
    <animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="245" r="1.5" fill="#fff">
    <animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Smile - too perfect, slightly unsettling -->
  <path d="M 435 255 Q 450 262 465 255" stroke="#000" stroke-width="2" fill="none"/>
  
  <!-- Geometric patterns suggesting control/system -->
  <line x1="50" y1="50" x2="150" y2="50" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="100" x2="150" y2="100" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="75" r="20" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="20;25;20" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
