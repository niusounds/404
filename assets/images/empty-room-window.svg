<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="roomGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#050404"/>
    </radialGradient>
    <filter id="dustBlur">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background room -->
  <rect width="800" height="500" fill="url(#roomGrad)"/>

  <!-- Floor -->
  <rect x="0" y="360" width="800" height="140" fill="#0d0b09"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#1a1610" stroke-width="1"/>

  <!-- Wall lines suggesting wallpaper/panels -->
  <rect x="0" y="0" width="800" height="360" fill="#120f0c"/>
  <line x1="200" y1="0" x2="200" y2="360" stroke="#1c1814" stroke-width="0.5" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="360" stroke="#1c1814" stroke-width="0.5" opacity="0.5"/>
  <line x1="600" y1="0" x2="600" y2="360" stroke="#1c1814" stroke-width="0.5" opacity="0.5"/>

  <!-- Window frame -->
  <rect x="300" y="60" width="200" height="240" fill="#0a0806" stroke="#2a2418" stroke-width="3"/>
  <!-- Window panes -->
  <rect x="303" y="63" width="96" height="115" fill="#0e1218"/>
  <rect x="401" y="63" width="96" height="115" fill="#0e1218"/>
  <rect x="303" y="180" width="96" height="117" fill="#0e1218"/>
  <rect x="401" y="180" width="96" height="117" fill="#0c1016"/>
  <!-- Cross dividers -->
  <line x1="300" y1="178" x2="500" y2="178" stroke="#2a2418" stroke-width="2"/>
  <line x1="399" y1="60" x2="399" y2="300" stroke="#2a2418" stroke-width="2"/>

  <!-- Faint light from window - moonlight -->
  <ellipse cx="400" cy="178" rx="110" ry="130" fill="#1a2030" opacity="0.15"/>

  <!-- Moon visible through window -->
  <circle cx="350" cy="120" r="22" fill="#d8d4c0" opacity="0.7" filter="url(#glow)"/>
  <circle cx="350" cy="120" r="22" fill="none" stroke="#e8e4d0" stroke-width="0.5" opacity="0.4"/>

  <!-- Moonlight on floor -->
  <polygon points="300,300 500,300 550,360 250,360" fill="#151a22" opacity="0.4"/>

  <!-- Silhouette of a figure visible through lower window pane - very subtle -->
  <rect x="420" y="200" width="40" height="80" rx="4" fill="#060504" opacity="0.85"/>
  <ellipse cx="440" cy="196" rx="16" ry="18" fill="#060504" opacity="0.85"/>
  <animate attributeName="opacity" values="0.85;0.6;0.85" dur="4s" repeatCount="indefinite" begin="0s"/>

  <!-- Dust particles -->
  <circle cx="140" cy="200" r="1.5" fill="#3a3028" opacity="0.6">
    <animate attributeName="cy" values="200;195;205;200" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="150" r="1" fill="#3a3028" opacity="0.5">
    <animate attributeName="cy" values="150;145;155;150" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="300" r="1.2" fill="#3a3028" opacity="0.4">
    <animate attributeName="cy" values="300;296;304;300" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Empty cardboard boxes on floor - suggesting clearing out an apartment -->
  <rect x="50" y="310" width="80" height="50" fill="#1a140c" stroke="#2a2015" stroke-width="1"/>
  <rect x="60" y="300" width="60" height="12" fill="#221a10" stroke="#2a2015" stroke-width="1"/>
  <line x1="90" y1="310" x2="90" y2="360" stroke="#2a2015" stroke-width="0.5"/>
  <line x1="50" y1="335" x2="130" y2="335" stroke="#2a2015" stroke-width="0.5"/>

  <rect x="640" y="290" width="100" height="70" fill="#1a140c" stroke="#2a2015" stroke-width="1"/>
  <rect x="650" y="278" width="80" height="14" fill="#221a10" stroke="#2a2015" stroke-width="1"/>

  <!-- Shadow on the floor - extending from the window figure outward into the room -->
  <polygon points="408,298 472,298 580,360 300,360" fill="#0a0806" opacity="0.5"/>

  <!-- Subtle text on wall - barely visible -->
  <text x="100" y="340" font-family="serif" font-size="10" fill="#1e1810" opacity="0.3" transform="rotate(-2,100,340)">まだここにいる</text>
</svg>
