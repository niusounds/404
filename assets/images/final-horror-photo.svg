<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background -->
  <rect width="800" height="600" fill="#000" />
  
  <!-- Distorted Main Figure -->
  <g transform="translate(400, 300)">
    <!-- Body -->
    <path d="M-50 100 L-40 250 L40 250 L50 100 Z" fill="#111" />
    
    <!-- Hands tearing face -->
    <path d="M-60 0 Q-80 -20 -70 -60" fill="none" stroke="#222" stroke-width="10" />
    <path d="M60 0 Q80 -20 70 -60" fill="none" stroke="#222" stroke-width="10" />
    
    <!-- Face (Blackened out) -->
    <circle cx="0" cy="-30" r="40" fill="#050505" stroke="#222" />
    <path d="M-20 -40 Q-30 -50 -40 -30" fill="none" stroke="#444" stroke-width="2" />
    <path d="M20 -40 Q30 -50 40 -30" fill="none" stroke="#444" stroke-width="2" />
  </g>
  
  <!-- The One-Eyed Entity behind -->
  <g transform="translate(420, 250)">
    <path d="M-100 0 Q-120 -150 0 -200 Q120 -150 100 0" fill="#0a0a0a" />
    <!-- The Eye -->
    <ellipse cx="0" cy="-100" rx="30" ry="15" fill="#111" />
    <circle cx="0" cy="-100" r="10" fill="#f00">
      <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Static/Noise Effect -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
  </filter>
  <rect width="800" height="600" filter="url(#noise)" opacity="0.1" />
</svg>
