<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Dark background / street -->
  <rect width="800" height="400" fill="#080810"/>

  <!-- Road -->
  <rect x="0" y="295" width="800" height="105" fill="#12121a"/>

  <!-- Faint street lamp glow from above -->
  <radialGradient id="topGlow" cx="50%" cy="0%" r="70%">
    <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="400" cy="100" rx="350" ry="220" fill="url(#topGlow)"/>

  <!-- Adult figure (protagonist) - slightly translucent / ghostly -->
  <g opacity="0.45">
    <!-- Head -->
    <circle cx="520" cy="165" r="24" fill="#1e1e2e"/>
    <!-- Neck -->
    <rect x="511" y="188" width="18" height="14" fill="#1e1e2e"/>
    <!-- Torso (coat) -->
    <rect x="493" y="200" width="54" height="70" rx="5" fill="#1e1e2e"/>
    <!-- Left arm -->
    <rect x="470" y="202" width="25" height="11" rx="5" fill="#1e1e2e"/>
    <!-- Right arm -->
    <rect x="545" y="202" width="25" height="11" rx="5" fill="#1e1e2e"/>
    <!-- Left leg -->
    <rect x="499" y="268" width="18" height="55" rx="5" fill="#1e1e2e"/>
    <!-- Right leg -->
    <rect x="523" y="268" width="18" height="55" rx="5" fill="#1e1e2e"/>
  </g>

  <!-- Ghost/chill aura around protagonist -->
  <radialGradient id="ghostAura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6666cc" stop-opacity="0.0"/>
    <stop offset="70%" stop-color="#6666cc" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#6666cc" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="520" cy="245" rx="75" ry="95" fill="url(#ghostAura)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Child figure (running, motion-blurred) -->
  <!-- Motion trail copies -->
  <g opacity="0.12" transform="translate(-28, 4)">
    <circle cx="295" cy="218" r="15" fill="#dddde8"/>
    <rect x="284" y="232" width="22" height="44" rx="4" fill="#dddde8"/>
    <rect x="282" y="266" width="12" height="36" rx="4" fill="#dddde8" transform="rotate(-22, 288, 266)"/>
    <rect x="296" y="266" width="12" height="36" rx="4" fill="#dddde8" transform="rotate(12, 302, 266)"/>
  </g>
  <g opacity="0.25" transform="translate(-15, 2)">
    <circle cx="295" cy="218" r="15" fill="#dddde8"/>
    <rect x="284" y="232" width="22" height="44" rx="4" fill="#dddde8"/>
    <rect x="282" y="266" width="12" height="36" rx="4" fill="#dddde8" transform="rotate(-22, 288, 266)"/>
    <rect x="296" y="266" width="12" height="36" rx="4" fill="#dddde8" transform="rotate(12, 302, 266)"/>
  </g>
  <!-- Main child figure -->
  <g opacity="0.88">
    <circle cx="295" cy="218" r="15" fill="#dddde8"/>
    <rect x="284" y="232" width="22" height="44" rx="4" fill="#dddde8"/>
    <!-- Left running leg -->
    <rect x="283" y="266" width="12" height="36" rx="4" fill="#dddde8" transform="rotate(-25, 289, 266)"/>
    <!-- Right running leg -->
    <rect x="297" y="266" width="12" height="36" rx="4" fill="#dddde8" transform="rotate(14, 303, 266)"/>
    <!-- Left arm (swinging back) -->
    <rect x="270" y="234" width="16" height="9" rx="4" fill="#dddde8" transform="rotate(-35, 278, 238)"/>
    <!-- Right arm (swinging forward) -->
    <rect x="305" y="234" width="16" height="9" rx="4" fill="#dddde8" transform="rotate(25, 313, 238)"/>
  </g>

  <!-- Intersection anomaly glow (where paths cross) -->
  <radialGradient id="intersect" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#9988ff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#9988ff" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="408" cy="265" rx="55" ry="38" fill="url(#intersect)">
    <animate attributeName="opacity" values="0;0.7;0;0.5;0" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
</svg>
