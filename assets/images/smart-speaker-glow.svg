<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#050510"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0" stop-opacity="0.6"><animate attributeName="stop-opacity" values="0.6;0.2;0.8;0.6" dur="3s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background desk -->
  <polygon points="0,500 800,450 800,600 0,600" fill="#111"/>
  <!-- Glow -->
  <circle cx="400" cy="350" r="150" fill="url(#glow)"/>
  <!-- Speaker -->
  <rect x="350" y="250" width="100" height="200" rx="20" fill="#222"/>
  <!-- Light ring -->
  <ellipse cx="400" cy="270" rx="40" ry="10" fill="none" stroke="#5f0" stroke-width="3">
    <animate attributeName="stroke" values="#5f0;#130;#af0;#5f0" dur="4s" repeatCount="indefinite"/>
  </ellipse>
</svg>
