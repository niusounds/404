<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="background-color: #05050a;">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
    </filter>
  </defs>

  <!-- メール画面の背景 -->
  <rect width="400" height="300" fill="#0a0808" stroke="#1a1a2e" stroke-width="2"/>

  <!-- タイトルバー -->
  <rect width="400" height="30" fill="#1a1a2e" stroke="#333333" stroke-width="1"/>
  <text x="10" y="20" font-family="monospace" font-size="12" fill="#cccccc">mail.company-system.jp</text>

  <!-- メール本文背景 -->
  <rect x="10" y="40" width="380" height="250" fill="#0f0f14" stroke="#333333" stroke-width="1"/>

  <!-- From: -->
  <text x="20" y="60" font-family="monospace" font-size="11" fill="#808080">From:</text>
  <text x="60" y="60" font-family="monospace" font-size="11" fill="#ff6b6b">satoh.kenta@company-mail.jp</text>

  <!-- Subject: -->
  <text x="20" y="80" font-family="monospace" font-size="11" fill="#808080">Subject:</text>
  <text x="80" y="80" font-family="monospace" font-size="11" fill="#ffff00">おはようございます</text>

  <!-- Time with glitch effect -->
  <text x="20" y="100" font-family="monospace" font-size="11" fill="#808080">Time:</text>
  <g filter="url(#glitch)">
    <text x="70" y="100" font-family="monospace" font-size="11" fill="#ff4444">2026-04-12 08:00:00</text>
  </g>

  <!-- 分割線 -->
  <line x1="20" y1="110" x2="380" y2="110" stroke="#333333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- メール本文 -->
  <text x="20" y="130" font-family="monospace" font-size="10" fill="#cccccc">おはようございます。</text>
  <text x="20" y="145" font-family="monospace" font-size="10" fill="#cccccc">ご心配をおかけしました。</text>
  <text x="20" y="160" font-family="monospace" font-size="10" fill="#cccccc">本日より通常通り出社いたします。</text>

  <!-- 警告テキスト（点滅） -->
  <g>
    <text x="20" y="185" font-family="monospace" font-size="10" fill="#ff4444">
      <tspan x="20" dy="0">※このメール送信者は</tspan>
      <tspan x="20" dy="12">社内に存在しません</tspan>
    </text>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <!-- デジタル的なノイズ線 -->
  <g opacity="0.2">
    <line x1="20" y1="210" x2="380" y2="210" stroke="#ff00ff" stroke-width="0.5"/>
    <line x1="20" y1="215" x2="375" y2="215" stroke="#00ffff" stroke-width="0.5"/>
    <line x1="25" y1="220" x2="380" y2="220" stroke="#ff00ff" stroke-width="0.5"/>
  </g>

  <!-- 送信者の目のようなシンボル（恐怖心煽り） -->
  <g filter="url(#glow)">
    <circle cx="80" cy="260" r="6" fill="none" stroke="#ff4444" stroke-width="2">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="260" r="3" fill="#ff4444">
      <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="260" r="6" fill="none" stroke="#ff4444" stroke-width="2">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="140" cy="260" r="3" fill="#ff4444">
      <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- 数字の繰り返し（隠蔽テキストの暗示） -->
  <text x="200" y="270" font-family="monospace" font-size="9" fill="#333333" opacity="0.5">04 08 04 08 04 08...</text>

  <!-- 不安を煽る脈動する背景 -->
  <rect x="50" y="220" width="300" height="60" fill="#ff0000" opacity="0" stroke="#ff4444" stroke-width="1">
    <animate attributeName="opacity" values="0;0.05;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
