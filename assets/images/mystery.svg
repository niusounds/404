<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- 背景（暗め） -->
  <rect width="100%" height="100%" fill="#0a0808"/>

  <!-- 手紙（封筒）のシルエット -->
  <g id="envelope" transform="translate(150,120)">
    <!-- 本体 -->
    <rect x="0" y="0" width="300" height="200" fill="#1e1e1e" rx="12" ry="12"/>
    <!-- 蓋 -->
    <polygon points="0,0 150,-80 300,0" fill="#1e1e1e"/>
    <!-- 影（鏡面のように揺れる） -->
    <ellipse cx="150" cy="210" rx="140" ry="15" fill="#000000" opacity="0.4"/>
  </g>

  <!-- 赤いインクで書かれた文字（アクセント） -->
  <text x="300" y="250" text-anchor="middle" font-family="serif" font-size="28"
        fill="#ff5555" opacity="0.8" style="pointer-events:none;">
    見つけたら、すぐに来い
  </text>

  <!-- 文字の微かな点滅アニメーション -->
  <animate attributeName="opacity"
           values="0.6;1;0.6"
           dur="2s"
           repeatCount="indefinite"
           begin="0s"/>
</svg>
