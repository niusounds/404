<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="scratch-glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c0905"/>
      <stop offset="40%" stop-color="#110d07"/>
      <stop offset="70%" stop-color="#0e0b06"/>
      <stop offset="100%" stop-color="#090805"/>
    </linearGradient>
    <radialGradient id="centerLight" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a1a0a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="380" fill="#060504"/>

  <!-- Door surface -->
  <rect x="80" y="20" width="440" height="360" fill="url(#woodGrad)" rx="2"/>

  <!-- Wood grain lines -->
  <line x1="110" y1="20" x2="115" y2="380" stroke="#0a0804" stroke-width="2"/>
  <line x1="160" y1="20" x2="158" y2="380" stroke="#0d0a06" stroke-width="1"/>
  <line x1="220" y1="20" x2="225" y2="380" stroke="#0a0804" stroke-width="1.5"/>
  <line x1="280" y1="20" x2="278" y2="380" stroke="#0d0b07" stroke-width="1"/>
  <line x1="340" y1="20" x2="345" y2="380" stroke="#0a0804" stroke-width="2"/>
  <line x1="400" y1="20" x2="398" y2="380" stroke="#0c0906" stroke-width="1"/>
  <line x1="460" y1="20" x2="465" y2="380" stroke="#0a0804" stroke-width="1.5"/>
  <line x1="500" y1="20" x2="498" y2="380" stroke="#0d0a06" stroke-width="1"/>

  <!-- Center panel recession lines -->
  <rect x="130" y="60" width="160" height="120" fill="none" stroke="#0a0705" stroke-width="2"/>
  <rect x="310" y="60" width="160" height="120" fill="none" stroke="#0a0705" stroke-width="2"/>
  <rect x="130" y="210" width="160" height="140" fill="none" stroke="#0a0705" stroke-width="2"/>
  <rect x="310" y="210" width="160" height="140" fill="none" stroke="#0a0705" stroke-width="2"/>

  <!-- Subtle center glow -->
  <rect x="80" y="20" width="440" height="360" fill="url(#centerLight)"/>

  <!-- SCRATCH MARKS - various clusters -->
  <!-- Cluster 1: Upper left area, frantic vertical/diagonal -->
  <g stroke="#3d1a0a" stroke-linecap="round" filter="url(#scratch-glow)">
    <line x1="145" y1="85" x2="148" y2="130" stroke-width="1.2"/>
    <line x1="153" y1="82" x2="155" y2="125" stroke-width="1"/>
    <line x1="160" y1="88" x2="162" y2="128" stroke-width="1.3"/>
    <line x1="168" y1="90" x2="164" y2="132" stroke-width="0.9"/>
    <line x1="143" y1="100" x2="175" y2="97" stroke-width="0.9"/>
    <line x1="142" y1="115" x2="176" y2="110" stroke-width="1"/>
    <!-- Diagonal scratch -->
    <line x1="148" y1="86" x2="170" y2="128" stroke-width="1.1"/>
    <line x1="165" y1="85" x2="145" y2="130" stroke-width="0.8"/>
  </g>

  <!-- Cluster 2: Upper right, more desperate -->
  <g stroke="#3d1a0a" stroke-linecap="round" filter="url(#scratch-glow)">
    <line x1="330" y1="70" x2="335" y2="105" stroke-width="1.3"/>
    <line x1="340" y1="68" x2="338" y2="110" stroke-width="1.1"/>
    <line x1="348" y1="72" x2="352" y2="108" stroke-width="1"/>
    <line x1="358" y1="75" x2="353" y2="112" stroke-width="1.2"/>
    <line x1="368" y1="78" x2="370" y2="115" stroke-width="0.9"/>
    <line x1="328" y1="88" x2="375" y2="85" stroke-width="1"/>
    <line x1="325" y1="102" x2="372" y2="98" stroke-width="0.9"/>
    <line x1="335" y1="70" x2="365" y2="112" stroke-width="1.1"/>
    <line x1="363" y1="68" x2="330" y2="108" stroke-width="0.8"/>
    <line x1="375" y1="72" x2="350" y2="114" stroke-width="0.9"/>
  </g>

  <!-- Cluster 3: Center, densest - most desperate -->
  <g stroke="#4a2010" stroke-linecap="round" filter="url(#scratch-glow)">
    <line x1="240" y1="150" x2="244" y2="210" stroke-width="1.5"/>
    <line x1="252" y1="145" x2="255" y2="215" stroke-width="1.3"/>
    <line x1="264" y1="148" x2="260" y2="218" stroke-width="1.4"/>
    <line x1="275" y1="152" x2="278" y2="208" stroke-width="1.2"/>
    <line x1="285" y1="150" x2="282" y2="212" stroke-width="1.3"/>
    <line x1="295" y1="155" x2="298" y2="205" stroke-width="1.1"/>
    <line x1="305" y1="148" x2="302" y2="215" stroke-width="1.4"/>
    <line x1="318" y1="152" x2="315" y2="210" stroke-width="1.2"/>
    <line x1="328" y1="150" x2="332" y2="208" stroke-width="1.3"/>
    <line x1="340" y1="155" x2="338" y2="205" stroke-width="1.1"/>
    <!-- Horizontal -->
    <line x1="238" y1="165" x2="345" y2="162" stroke-width="1.1"/>
    <line x1="238" y1="178" x2="345" y2="175" stroke-width="1.3"/>
    <line x1="238" y1="192" x2="345" y2="189" stroke-width="1"/>
    <line x1="238" y1="205" x2="345" y2="202" stroke-width="1.2"/>
    <!-- Diagonal mass -->
    <line x1="240" y1="148" x2="345" y2="218" stroke-width="1.2"/>
    <line x1="345" y1="148" x2="240" y2="218" stroke-width="1.2"/>
    <line x1="270" y1="145" x2="345" y2="195" stroke-width="0.9"/>
    <line x1="240" y1="170" x2="340" y2="218" stroke-width="0.8"/>
  </g>
  <!-- Brighter scratches (newer) in the cluster -->
  <g stroke="#7a3518" stroke-linecap="round" filter="url(#scratch-glow)">
    <line x1="255" y1="152" x2="258" y2="200" stroke-width="1.2">
      <animate attributeName="opacity" values="0.9;0.6;1;0.8;0.9" dur="7s" repeatCount="indefinite"/>
    </line>
    <line x1="290" y1="148" x2="288" y2="212" stroke-width="1.3">
      <animate attributeName="opacity" values="1;0.5;0.9;1;0.7" dur="9s" repeatCount="indefinite"/>
    </line>
    <line x1="310" y1="155" x2="314" y2="205" stroke-width="1.1">
      <animate attributeName="opacity" values="0.8;1;0.6;0.9;0.8" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="242" y1="180" x2="342" y2="177" stroke-width="1">
      <animate attributeName="opacity" values="1;0.6;1;0.7;1" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Cluster 4: Lower area -->
  <g stroke="#3d1a0a" stroke-linecap="round" filter="url(#scratch-glow)">
    <line x1="150" y1="250" x2="153" y2="300" stroke-width="1.1"/>
    <line x1="162" y1="248" x2="160" y2="298" stroke-width="0.9"/>
    <line x1="172" y1="252" x2="175" y2="296" stroke-width="1"/>
    <line x1="148" y1="268" x2="180" y2="265" stroke-width="0.9"/>
    <line x1="148" y1="283" x2="180" y2="280" stroke-width="1"/>
  </g>

  <!-- Cluster 5: Lower right -->
  <g stroke="#3d1a0a" stroke-linecap="round" filter="url(#scratch-glow)">
    <line x1="420" y1="260" x2="425" y2="310" stroke-width="1.2"/>
    <line x1="432" y1="258" x2="430" y2="312" stroke-width="1"/>
    <line x1="442" y1="262" x2="445" y2="308" stroke-width="1.1"/>
    <line x1="418" y1="278" x2="450" y2="275" stroke-width="0.9"/>
    <line x1="418" y1="293" x2="450" y2="290" stroke-width="1"/>
    <line x1="425" y1="258" x2="442" y2="310" stroke-width="0.9"/>
  </g>

  <!-- Hint of handprint (faint, center-left) -->
  <g opacity="0.25" fill="#3a1505">
    <!-- Palm -->
    <ellipse cx="195" cy="200" rx="18" ry="22"/>
    <!-- Fingers -->
    <ellipse cx="183" cy="178" rx="5" ry="11" transform="rotate(-15,183,178)"/>
    <ellipse cx="193" cy="173" rx="5" ry="12" transform="rotate(-5,193,173)"/>
    <ellipse cx="204" cy="173" rx="5" ry="12" transform="rotate(5,204,173)"/>
    <ellipse cx="214" cy="178" rx="5" ry="11" transform="rotate(15,214,178)"/>
    <ellipse cx="178" cy="188" rx="5" ry="9" transform="rotate(-35,178,188)"/>
  </g>

  <!-- Very faint second handprint (right) -->
  <g opacity="0.15" fill="#3a1505">
    <ellipse cx="410" cy="190" rx="16" ry="20"/>
    <ellipse cx="399" cy="171" rx="4" ry="10" transform="rotate(-10,399,171)"/>
    <ellipse cx="408" cy="167" rx="4.5" ry="11" transform="rotate(-2,408,167)"/>
    <ellipse cx="418" cy="168" rx="4.5" ry="11" transform="rotate(4,418,168)"/>
    <ellipse cx="427" cy="173" rx="4" ry="10" transform="rotate(12,427,173)"/>
  </g>

  <!-- Subtle red light suggestion from beyond the door -->
  <rect x="80" y="20" width="440" height="360" fill="#8b0000" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.05;0.01;0.04;0.02" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- Edge vignette -->
  <rect x="80" y="20" width="440" height="360" fill="url(#grain)" opacity="0.15"/>
</svg>
