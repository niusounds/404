<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#04040e"/>
    </radialGradient>
    <radialGradient id="glowPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a5a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#04040e" stop-opacity="0"/>
    </radialGradient>
    <filter id="ghostBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="420" fill="#04040a"/>

  <!-- Watch strap top -->
  <rect x="168" y="10" width="64" height="55" rx="6" fill="#1a0e0e" stroke="#2a1a10" stroke-width="1"/>
  <rect x="175" y="10" width="50" height="55" rx="4" fill="#150c0c"/>
  <!-- Strap holes -->
  <circle cx="200" cy="28" r="3" fill="#05050a"/>
  <circle cx="200" cy="44" r="3" fill="#05050a"/>

  <!-- Watch strap bottom -->
  <rect x="168" y="355" width="64" height="55" rx="6" fill="#1a0e0e" stroke="#2a1a10" stroke-width="1"/>
  <rect x="175" y="355" width="50" height="55" rx="4" fill="#150c0c"/>
  <circle cx="200" cy="372" r="3" fill="#05050a"/>
  <circle cx="200" cy="388" r="3" fill="#05050a"/>

  <!-- Watch case outer shadow -->
  <circle cx="202" cy="212" r="154" fill="#080808" opacity="0.6"/>

  <!-- Watch case bezel -->
  <circle cx="200" cy="210" r="152" fill="none" stroke="#1e1420" stroke-width="14"/>
  <circle cx="200" cy="210" r="149" fill="none" stroke="#2e2040" stroke-width="3"/>
  <circle cx="200" cy="210" r="145" fill="none" stroke="#1a1030" stroke-width="1"/>

  <!-- Watch face background -->
  <circle cx="200" cy="210" r="140" fill="url(#faceGrad)"/>

  <!-- Pulse glow ring animation -->
  <circle cx="200" cy="210" r="140" fill="url(#glowPulse)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Hour markers -->
  <g stroke="#6a6a9a" stroke-width="2.5" stroke-linecap="round">
    <!-- 12 --> <line x1="200" y1="82" x2="200" y2="100"/>
    <!-- 1  --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(30,200,210)"/>
    <!-- 2  --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(60,200,210)"/>
    <!-- 3  --> <line x1="338" y1="210" x2="320" y2="210"/>
    <!-- 4  --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(120,200,210)"/>
    <!-- 5  --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(150,200,210)"/>
    <!-- 6  --> <line x1="200" y1="338" x2="200" y2="320"/>
    <!-- 7  --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(210,200,210)"/>
    <!-- 8  --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(240,200,210)"/>
    <!-- 9  --> <line x1="62" y1="210" x2="80" y2="210"/>
    <!-- 10 --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(300,200,210)"/>
    <!-- 11 --> <line x1="270" y1="96" x2="261" y2="112" transform="rotate(330,200,210)"/>
  </g>

  <!-- Minute markers (thin) -->
  <g stroke="#333355" stroke-width="1">
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(6,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(12,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(18,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(24,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(36,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(42,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(48,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(54,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(66,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(72,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(78,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(84,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(96,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(102,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(108,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(114,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(126,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(132,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(138,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(144,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(156,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(162,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(168,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(174,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(186,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(192,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(198,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(204,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(216,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(222,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(228,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(234,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(246,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(252,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(258,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(264,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(276,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(282,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(288,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(294,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(306,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(312,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(318,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(324,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(336,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(342,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(348,200,210)"/>
    <line x1="200" y1="82" x2="200" y2="90" transform="rotate(354,200,210)"/>
  </g>

  <!-- Ghost hands — "real" time, 7 minutes behind (3:00): pulsing faint blue-white -->
  <!-- Ghost minute hand at 0° (pointing up) -->
  <g filter="url(#ghostBlur)">
    <line x1="200" y1="210" x2="200" y2="110" stroke="#7070c0" stroke-width="3" stroke-linecap="round" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <!-- Ghost hour hand at 90° (pointing right, = 3 o'clock) -->
    <line x1="200" y1="210" x2="270" y2="210" stroke="#7070c0" stroke-width="5" stroke-linecap="round" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Real hands — "watch" time 3:07 -->
  <!-- Minute hand at 42° (7 min * 6°/min) -->
  <line x1="200" y1="210" x2="200" y2="108" stroke="#d8d8f0" stroke-width="3" stroke-linecap="round" transform="rotate(42, 200, 210)"/>
  <!-- Hour hand at ~93.5° (3h 7min) -->
  <line x1="200" y1="210" x2="200" y2="148" stroke="#d8d8f0" stroke-width="5" stroke-linecap="round" transform="rotate(93.5, 200, 210)"/>
  <!-- Seconds hand (thin, red) -->
  <line x1="200" y1="230" x2="200" y2="108" stroke="#8a1a1a" stroke-width="1.5" stroke-linecap="round" transform="rotate(180, 200, 210)">
    <animateTransform attributeName="transform" type="rotate" from="180 200 210" to="540 200 210" dur="60s" repeatCount="indefinite"/>
  </line>

  <!-- Center cap -->
  <circle cx="200" cy="210" r="7" fill="#c0c0d8"/>
  <circle cx="200" cy="210" r="3" fill="#1a1a3a"/>

  <!-- Faint "七分" text -->
  <text x="200" y="260" text-anchor="middle" font-size="12" fill="#4a4a7a" font-family="serif" opacity="0.6" letter-spacing="2">七分</text>
</svg>
