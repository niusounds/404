<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Complete darkness -->
  <rect width="800" height="500" fill="#000000"/>
  
  <!-- Computer screen glow -->
  <rect x="200" y="100" width="400" height="300" fill="#001a00" opacity="0.5"/>
  <rect x="210" y="110" width="380" height="280" fill="#002200">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Terminal-style text -->
  <text x="230" y="140" font-family="monospace" font-size="14" fill="#00ff88" opacity="0.9">
    <tspan x="230" dy="0">&gt; SYSTEM MESSAGE</tspan>
    <tspan x="230" dy="25">_________________________</tspan>
    <tspan x="230" dy="35"> </tspan>
    <tspan x="230" dy="25">気づいてしまったのですね</tspan>
    <tspan x="230" dy="30"> </tspan>
    <tspan x="230" dy="25">あなたは"選ばれた読者"</tspan>
    <tspan x="230" dy="25">でした。</tspan>
    <tspan x="230" dy="30"> </tspan>
    <tspan x="230" dy="25">被験者番号: #2374</tspan>
    <tspan x="230" dy="30"> </tspan>
    <tspan x="230" dy="25">STATUS: AWARENESS_DETECTED</tspan>
  </text>
  
  <!-- Cursor blinking -->
  <rect x="230" y="350" width="10" height="18" fill="#00ff88">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Glowing edges of screen -->
  <rect x="200" y="100" width="400" height="300" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  
  <!-- Reflection of viewer (silhouette) -->
  <ellipse cx="400" cy="450" rx="60" ry="30" fill="#001100" opacity="0.4"/>
  <ellipse cx="400" cy="430" rx="40" ry="50" fill="#001a00" opacity="0.5"/>
  
  <!-- Digital artifacts -->
  <rect x="150" y="120" width="2" height="15" fill="#00ff88" opacity="0.3">
    <animate attributeName="y" values="120;350;120" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="650" y="200" width="2" height="15" fill="#00ff88" opacity="0.3">
    <animate attributeName="y" values="200;380;200" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
