<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Dark sky/background -->
  <rect width="800" height="400" fill="#0a0a0f"/>

  <!-- Building silhouettes -->
  <rect x="0" y="150" width="120" height="250" fill="#0f0f16"/>
  <rect x="10" y="120" width="100" height="280" fill="#111119"/>
  <rect x="650" y="140" width="150" height="260" fill="#0f0f16"/>
  <rect x="680" y="110" width="120" height="290" fill="#111119"/>
  <rect x="280" y="165" width="90" height="235" fill="#0f0f16"/>
  <rect x="420" y="175" width="75" height="225" fill="#111119"/>

  <!-- Lit windows -->
  <rect x="30" y="145" width="14" height="18" fill="#c8a050" opacity="0.4"/>
  <rect x="60" y="165" width="14" height="18" fill="#c8a050" opacity="0.25"/>
  <rect x="670" y="130" width="14" height="18" fill="#c8a050" opacity="0.45"/>
  <rect x="705" y="160" width="14" height="18" fill="#c8a050" opacity="0.2"/>
  <rect x="430" y="185" width="12" height="16" fill="#c8a050" opacity="0.3"/>

  <!-- Road surface -->
  <rect x="0" y="280" width="800" height="120" fill="#16161d"/>

  <!-- Road center markings -->
  <rect x="392" y="290" width="8" height="35" fill="#44444f" opacity="0.5"/>
  <rect x="392" y="340" width="8" height="35" fill="#44444f" opacity="0.5"/>
  <rect x="392" y="390" width="8" height="30" fill="#44444f" opacity="0.5"/>

  <!-- Street lamp post -->
  <rect x="396" y="118" width="7" height="165" fill="#2e2e3c"/>
  <!-- Lamp arm -->
  <path d="M396,125 Q376,113 364,118" stroke="#2e2e3c" stroke-width="5" fill="none"/>

  <!-- Lamp glow halo -->
  <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffcc66" stop-opacity="0.55"/>
    <stop offset="60%" stop-color="#ffcc44" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="364" cy="128" rx="130" ry="110" fill="url(#lampGlow)"/>

  <!-- Light cone on road -->
  <radialGradient id="roadLight" cx="50%" cy="0%" r="100%">
    <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="364" cy="310" rx="110" ry="65" fill="url(#roadLight)"/>

  <!-- Lamp bulb (flickering) -->
  <rect x="356" y="116" width="18" height="11" fill="#ffdd88" rx="3">
    <animate attributeName="opacity" values="1;0.75;1;0.9;0.55;1;0.85;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Lamp housing -->
  <rect x="353" y="112" width="24" height="6" fill="#333344" rx="2"/>

  <!-- Distant figure silhouette (protagonist walking) -->
  <g opacity="0.6" transform="translate(560, 240)">
    <circle cx="0" cy="0" r="8" fill="#1c1c26"/>
    <rect x="-5" y="8" width="10" height="22" rx="3" fill="#1c1c26"/>
    <rect x="-12" y="10" width="7" height="4" rx="2" fill="#1c1c26"/>
    <rect x="5" y="10" width="7" height="4" rx="2" fill="#1c1c26"/>
    <rect x="-5" y="28" width="4" height="14" rx="2" fill="#1c1c26"/>
    <rect x="1" y="28" width="4" height="14" rx="2" fill="#1c1c26"/>
  </g>
</svg>
