<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#e08020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0808" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="500" fill="#05040a"/>

  <!-- Wet cobblestone ground -->
  <rect x="0" y="360" width="800" height="140" fill="#0d0c14"/>
  <!-- Puddle reflections -->
  <ellipse cx="400" cy="410" rx="120" ry="18" fill="#1a1630" opacity="0.7"/>
  <ellipse cx="400" cy="410" rx="80" ry="10" fill="#e08020" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.08;0.15;0.10;0.12" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="440" rx="60" ry="8" fill="#111" opacity="0.5"/>
  <ellipse cx="620" cy="430" rx="45" ry="6" fill="#111" opacity="0.4"/>

  <!-- Alley walls -->
  <rect x="0" y="0" width="160" height="500" fill="#0c0b12"/>
  <rect x="640" y="0" width="160" height="500" fill="#0c0b12"/>

  <!-- Rain streaks -->
  <g opacity="0.3" filter="url(#softBlur)">
    <line x1="180" y1="0" x2="175" y2="80" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="220" y1="20" x2="215" y2="110" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="295" y2="90" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="380" y1="10" x2="374" y2="100" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="445" y2="85" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="530" y1="15" x2="524" y2="95" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="594" y2="80" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="250" y1="120" x2="245" y2="210" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="340" y1="100" x2="334" y2="200" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="490" y1="110" x2="484" y2="200" stroke="#8899bb" stroke-width="0.5"/>
    <line x1="560" y1="90" x2="554" y2="190" stroke="#8899bb" stroke-width="0.5"/>
  </g>
  <g opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.25;0.18;0.22;0.2" dur="2s" repeatCount="indefinite"/>
    <line x1="190" y1="200" x2="185" y2="300" stroke="#99aacc" stroke-width="0.5"/>
    <line x1="280" y1="220" x2="275" y2="320" stroke="#99aacc" stroke-width="0.5"/>
    <line x1="360" y1="210" x2="355" y2="310" stroke="#99aacc" stroke-width="0.5"/>
    <line x1="430" y1="230" x2="424" y2="330" stroke="#99aacc" stroke-width="0.5"/>
    <line x1="510" y1="200" x2="504" y2="300" stroke="#99aacc" stroke-width="0.5"/>
    <line x1="590" y1="215" x2="584" y2="315" stroke="#99aacc" stroke-width="0.5"/>
  </g>

  <!-- Yatai stall body -->
  <rect x="260" y="220" width="280" height="150" fill="#1a1208" stroke="#3a2910" stroke-width="2"/>
  <!-- Stall roof -->
  <polygon points="240,220 560,220 580,195 220,195" fill="#2a1e0a" stroke="#4a3318" stroke-width="1.5"/>
  <!-- Roof overhang edge -->
  <line x1="220" y1="195" x2="580" y2="195" stroke="#6a4820" stroke-width="2"/>

  <!-- Warm interior glow -->
  <rect x="262" y="222" width="276" height="146" fill="url(#lanternGlow)" opacity="0.3"/>

  <!-- Counter / bar -->
  <rect x="260" y="290" width="280" height="20" fill="#2a1e0a" stroke="#5a3c18" stroke-width="1"/>

  <!-- Steaming pot on counter -->
  <ellipse cx="400" cy="285" rx="55" ry="15" fill="#1a1208" stroke="#4a3010" stroke-width="1.5"/>
  <ellipse cx="400" cy="280" rx="50" ry="12" fill="#0d0906"/>
  <!-- Steam from pot -->
  <g opacity="0.6">
    <path d="M370 280 Q365 260 372 245 Q379 230 374 215" stroke="#c8b090" stroke-width="1.5" fill="none" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.6;0.3;0.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M370 280 Q365 260 372 245 Q379 230 374 215;M370 280 Q375 260 368 245 Q361 230 366 215;M370 280 Q365 260 372 245 Q379 230 374 215" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M400 275 Q394 255 402 240 Q410 225 404 210" stroke="#c8b090" stroke-width="1.5" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.1;0.5;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M428 280 Q434 258 427 244 Q420 230 426 214" stroke="#c8b090" stroke-width="1.5" fill="none" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.6;0.2;0.5;0.4" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Lanterns hanging from roof -->
  <line x1="290" y1="195" x2="290" y2="215" stroke="#5a4020" stroke-width="1.5"/>
  <ellipse cx="290" cy="220" rx="14" ry="18" fill="#d04020" stroke="#801808" stroke-width="1"/>
  <ellipse cx="290" cy="220" rx="10" ry="14" fill="#f06030" opacity="0.7"/>
  <line x1="510" y1="195" x2="510" y2="215" stroke="#5a4020" stroke-width="1.5"/>
  <ellipse cx="510" cy="220" rx="14" ry="18" fill="#d04020" stroke="#801808" stroke-width="1"/>
  <ellipse cx="510" cy="220" rx="10" ry="14" fill="#f06030" opacity="0.7"/>
  <!-- Lantern flicker -->
  <ellipse cx="290" cy="220" rx="10" ry="14" fill="#ffcc44" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.4;0.05;0.35;0.2;0.3" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="510" cy="220" rx="10" ry="14" fill="#ffcc44" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.4;0.05;0.3;0.1;0.35;0.3" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Sign on stall front -->
  <rect x="350" y="235" width="100" height="40" fill="#1a0e04" stroke="#4a3010" stroke-width="1"/>
  <text x="400" y="262" text-anchor="middle" fill="#e8c070" font-size="18" font-family="serif">出汁</text>

  <!-- Old stall owner silhouette -->
  <ellipse cx="400" cy="240" rx="20" ry="22" fill="#0a0806"/>
  <rect x="382" y="258" width="36" height="50" fill="#0a0806" rx="3"/>
  <!-- Arms -->
  <line x1="382" y1="270" x2="355" y2="285" stroke="#0a0806" stroke-width="8" stroke-linecap="round"/>
  <line x1="418" y1="270" x2="445" y2="285" stroke="#0a0806" stroke-width="8" stroke-linecap="round"/>

  <!-- Lone figure approaching from afar -->
  <g opacity="0.5">
    <ellipse cx="620" cy="330" rx="8" ry="9" fill="#1a1820"/>
    <rect x="614" y="338" width="12" height="25" fill="#1a1820" rx="2"/>
    <!-- Umbrella -->
    <line x1="620" y1="321" x2="620" y2="305" stroke="#2a2840" stroke-width="1.5"/>
    <path d="M605 305 Q620 295 635 305" stroke="#2a2840" stroke-width="1.5" fill="#1a1830" opacity="0.7"/>
  </g>

  <!-- Glow effect around stall -->
  <ellipse cx="400" cy="280" rx="180" ry="120" fill="url(#lanternGlow)" opacity="0.15" filter="url(#blur)"/>
</svg>
