<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a0e0e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b03030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb8c00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sunset)" />
  
  <!-- Shadows like bars -->
  <g fill="#000" opacity="0.6">
    <rect x="20" y="0" width="10" height="300" transform="skewX(-30)"/>
    <rect x="80" y="0" width="10" height="300" transform="skewX(-30)"/>
    <rect x="140" y="0" width="10" height="300" transform="skewX(-30)"/>
    <rect x="200" y="0" width="10" height="300" transform="skewX(-30)"/>
    <rect x="260" y="0" width="10" height="300" transform="skewX(-30)"/>
    <rect x="320" y="0" width="10" height="300" transform="skewX(-30)"/>
    
    <rect x="0" y="40" width="400" height="8" transform="skewY(10)"/>
    <rect x="0" y="100" width="400" height="8" transform="skewY(10)"/>
    <rect x="0" y="160" width="400" height="8" transform="skewY(10)"/>
  </g>
  
  <!-- Flickering atmosphere -->
  <rect width="400" height="300" fill="#f00" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
