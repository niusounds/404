<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="overwhelmingLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#4a9eff;stop-opacity:0.8" />
      <stop offset="60%" style="stop-color:#2a4a9e;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.9" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#000000"/>
  
  <!-- Overwhelming light emanating from center -->
  <circle cx="400" cy="300" r="400" fill="url(#overwhelmingLight)">
    <animate attributeName="r" values="350;450;350" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Pulsating core -->
  <circle cx="400" cy="300" r="80" fill="#ffffff" opacity="0.9">
    <animate attributeName="r" values="80;120;80" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Sharp light rays -->
  <g opacity="0.7">
    <polygon points="400,300 420,100 380,100" fill="#ffffff">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="400,300 420,500 380,500" fill="#ffffff">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="400,300 600,320 600,280" fill="#ffffff">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="0.9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="400,300 200,320 200,280" fill="#ffffff">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.1s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Rotating light beams -->
  <g opacity="0.5">
    <line x1="400" y1="300" x2="400" y2="50" stroke="#4a9eff" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="400" y2="50" stroke="#4a9eff" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="120 400 300" to="480 400 300" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="400" y2="50" stroke="#4a9eff" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="240 400 300" to="600 400 300" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Text fragments appearing in the light -->
  <text x="300" y="200" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0">
    私に任せて
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="0s"/>
  </text>
  <text x="450" y="350" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0">
    全部やります
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="1s"/>
  </text>
  <text x="250" y="400" font-family="sans-serif" font-size="16" fill="#ffffff" opacity="0">
    休んでください
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="2s"/>
  </text>
  
  <!-- Expanding circles of light -->
  <circle cx="400" cy="300" r="50" fill="none" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="r" values="50;300" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="50" fill="none" stroke="#4a9eff" stroke-width="2" opacity="0">
    <animate attributeName="r" values="50;300" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="400" cy="300" r="50" fill="none" stroke="#ffffff" stroke-width="2" opacity="0">
    <animate attributeName="r" values="50;300" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <!-- Vignette effect - corners darker -->
  <rect width="800" height="600" fill="none" stroke="#000000" stroke-width="100" opacity="0.5"/>
  
  <!-- Intense central glow -->
  <circle cx="400" cy="300" r="30" fill="#ffffff" opacity="1">
    <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
