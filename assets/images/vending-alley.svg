<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alleyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050505;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- Alley Background -->
  <rect width="800" height="400" fill="url(#alleyGradient)" />
  <rect width="800" height="400" fill="rgba(0,0,0,0.5)" filter="url(#noise)" />
  
  <!-- Walls -->
  <path d="M 0 0 L 250 150 L 250 400 L 0 400 Z" fill="#0a0a0a" stroke="#222" stroke-width="2" />
  <path d="M 800 0 L 550 150 L 550 400 L 800 400 Z" fill="#0a0a0a" stroke="#222" stroke-width="2" />
  
  <!-- Vending Machine -->
  <rect x="330" y="100" width="140" height="260" fill="#222" stroke="#111" stroke-width="4" />
  <rect x="340" y="110" width="120" height="150" fill="#000" /> <!-- Display panel -->
  
  <!-- Vines -->
  <path d="M 330 150 Q 310 200 330 250" stroke="#050505" stroke-width="3" fill="none" />
  <path d="M 470 120 Q 490 180 470 240" stroke="#050505" stroke-width="4" fill="none" />
  <path d="M 350 100 Q 320 80 300 120" stroke="#050505" stroke-width="2" fill="none" />
  
  <!-- Buttons (Small circles) -->
  <circle cx="360" cy="130" r="5" fill="#eee" />
  <circle cx="380" cy="130" r="5" fill="#eee" />
  <circle cx="400" cy="130" r="5" fill="#eee" />
  <circle cx="420" cy="130" r="5" fill="#eee" />
  <circle cx="440" cy="130" r="5" fill="#eee" />
  
  <!-- Big 'Omakase' Button -->
  <rect x="350" y="240" width="100" height="20" rx="5" fill="#300" stroke="#500" />
  <text x="400" y="255" font-family="serif" font-size="10" fill="#900" text-anchor="middle">おまかせ</text>
  
  <!-- Dispensing Slot (Glow) -->
  <rect x="350" y="300" width="100" height="40" fill="#fff" filter="url(#glow)" opacity="0.6" />
  <rect x="355" y="305" width="90" height="30" fill="#bdf" />
  
  <!-- Ground Shadow -->
  <ellipse cx="400" cy="380" rx="150" ry="20" fill="rgba(0,0,0,0.8)" filter="url(#glow)" />
</svg>
