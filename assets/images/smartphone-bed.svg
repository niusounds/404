<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#1a1a1a" />
  <!-- Bed/Blanket -->
  <path d="M0 200 Q200 180 400 220 L400 300 L0 300 Z" fill="#2c3e50" />
  <!-- Smartphone -->
  <rect x="150" y="140" width="100" height="180" rx="10" ry="10" fill="#34495e" transform="rotate(-15 200 150)" />
  <rect x="155" y="145" width="90" height="170" rx="5" ry="5" fill="#ecf0f1" opacity="0.8" transform="rotate(-15 200 150)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" />
  </rect>
  <!-- Glow -->
  <circle cx="200" cy="180" r="50" fill="url(#glowGradient)" />
  <defs>
    <radialGradient id="glowGradient">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3498db" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>