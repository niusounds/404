<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">深夜の漬物蔵</title>
  <desc id="desc">木桶が並ぶ暗い蔵。蓋の隙間から不気味な光が漏れる。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050a"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <radialGradient id="spill" cx="52%" cy="78%" r="30%">
      <stop offset="0%" stop-color="#6c8f6a" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#6c8f6a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="120" y="120" width="960" height="500" rx="20" fill="#111018" stroke="#2d2a32" stroke-width="3"/>

  <g opacity="0.88">
    <ellipse cx="320" cy="500" rx="120" ry="150" fill="#2a1f17"/>
    <ellipse cx="320" cy="420" rx="120" ry="42" fill="#3a2d22"/>
    <rect x="200" y="420" width="240" height="84" fill="#2f241c"/>

    <ellipse cx="600" cy="510" rx="145" ry="165" fill="#2a1f17"/>
    <ellipse cx="600" cy="420" rx="145" ry="48" fill="#3a2d22"/>
    <rect x="455" y="420" width="290" height="90" fill="#2f241c"/>

    <ellipse cx="890" cy="500" rx="120" ry="150" fill="#2a1f17"/>
    <ellipse cx="890" cy="420" rx="120" ry="42" fill="#3a2d22"/>
    <rect x="770" y="420" width="240" height="84" fill="#2f241c"/>
  </g>

  <ellipse cx="600" cy="545" rx="280" ry="130" fill="url(#spill)" filter="url(#soft)">
    <animate attributeName="opacity" values="0.35;0.55;0.35" dur="4.8s" repeatCount="indefinite"/>
  </ellipse>

  <rect x="525" y="402" width="150" height="10" rx="5" fill="#9aac8f" opacity="0.7">
    <animate attributeName="y" values="402;399;402" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <g opacity="0.55" fill="#b8c8b6">
    <circle cx="560" cy="370" r="3">
      <animate attributeName="cy" values="370;360;370" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="360" r="2.5">
      <animate attributeName="cy" values="360;350;360" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="372" r="3">
      <animate attributeName="cy" values="372;362;372" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0" dur="2.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
