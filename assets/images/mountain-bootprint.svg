<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="groundBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <radialGradient id="soilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d2e1e"/>
      <stop offset="100%" stop-color="#1e1208"/>
    </radialGradient>
    <radialGradient id="spotLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b5030" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e1208" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark soil background -->
  <rect width="800" height="500" fill="#120904"/>
  <rect width="800" height="500" fill="url(#soilGrad)"/>

  <!-- Subtle soil texture lines -->
  <g filter="url(#groundBlur)" opacity="0.3">
    <line x1="0" y1="120" x2="800" y2="140" stroke="#2a1a0a" stroke-width="3"/>
    <line x1="0" y1="200" x2="800" y2="185" stroke="#2a1a0a" stroke-width="2"/>
    <line x1="0" y1="280" x2="800" y2="300" stroke="#2a1a0a" stroke-width="4"/>
    <line x1="0" y1="370" x2="800" y2="355" stroke="#2a1a0a" stroke-width="2"/>
    <line x1="0" y1="450" x2="800" y2="460" stroke="#2a1a0a" stroke-width="3"/>
    <!-- Cross lines -->
    <line x1="150" y1="0" x2="130" y2="500" stroke="#2a1a0a" stroke-width="2"/>
    <line x1="380" y1="0" x2="400" y2="500" stroke="#2a1a0a" stroke-width="1.5"/>
    <line x1="600" y1="0" x2="590" y2="500" stroke="#2a1a0a" stroke-width="2"/>
  </g>

  <!-- Small rocks and pebbles -->
  <ellipse cx="80" cy="150" rx="18" ry="10" fill="#2a1e10" opacity="0.7"/>
  <ellipse cx="200" cy="400" rx="12" ry="7" fill="#261c0e" opacity="0.6"/>
  <ellipse cx="650" cy="200" rx="22" ry="11" fill="#2a1e10" opacity="0.5"/>
  <ellipse cx="720" cy="430" rx="9" ry="5" fill="#261c0e" opacity="0.7"/>
  <ellipse cx="130" cy="320" rx="7" ry="4" fill="#281c0e" opacity="0.5"/>
  <ellipse cx="500" cy="80" rx="14" ry="8" fill="#2a1e10" opacity="0.6"/>

  <!-- Dried leaves scattered -->
  <g opacity="0.4">
    <ellipse cx="160" cy="240" rx="18" ry="6" fill="#4a2e0e" transform="rotate(-20,160,240)"/>
    <ellipse cx="600" cy="350" rx="15" ry="5" fill="#3e2408" transform="rotate(30,600,350)"/>
    <ellipse cx="300" cy="460" rx="20" ry="6" fill="#4a2e0e" transform="rotate(-10,300,460)"/>
    <ellipse cx="680" cy="110" rx="12" ry="4" fill="#3e2408" transform="rotate(45,680,110)"/>
  </g>

  <!-- Spotlight from above (between trees) -->
  <ellipse cx="400" cy="250" rx="280" ry="200" fill="url(#spotLight)" opacity="0.6"/>

  <!-- THE BOOT PRINT - main feature, centered -->
  <!-- Sole outline -->
  <g transform="translate(400, 250)">
    <!-- Main sole shape -->
    <path d="M-45,-100 C-52,-80 -55,-50 -55,0 C-55,40 -50,80 -35,100 C-20,115 20,115 35,100 C50,80 55,40 55,0 C55,-50 52,-80 45,-100 C30,-115 -30,-115 -45,-100 Z"
          fill="#1a0d04" stroke="#0d0602" stroke-width="2"/>

    <!-- Heel grip pattern -->
    <rect x="-38" y="65" width="76" height="28" rx="4" fill="#140b03"/>
    <rect x="-32" y="70" width="20" height="18" rx="2" fill="#1e1008"/>
    <rect x="-6" y="70" width="12" height="18" rx="2" fill="#1e1008"/>
    <rect x="12" y="70" width="20" height="18" rx="2" fill="#1e1008"/>

    <!-- Distinctive heel cut/scar -->
    <path d="M20,75 L38,75 L38,93 L20,93" fill="none" stroke="#2e1a08" stroke-width="3"/>
    <path d="M30,75 L30,93" stroke="#3a2010" stroke-width="4"/>
    <!-- The cut that was repaired -->
    <path d="M32,68 L32,98" stroke="#4a2e14" stroke-width="2.5" stroke-dasharray="4,3"/>

    <!-- Mid-sole pattern -->
    <rect x="-40" y="20" width="80" height="35" rx="3" fill="#140b03"/>
    <line x1="-38" y1="28" x2="38" y2="28" stroke="#1e1008" stroke-width="3"/>
    <line x1="-38" y1="36" x2="38" y2="36" stroke="#1e1008" stroke-width="3"/>
    <line x1="-38" y1="44" x2="38" y2="44" stroke="#1e1008" stroke-width="3"/>

    <!-- Toe area pattern -->
    <ellipse cx="0" cy="-55" rx="38" ry="40" fill="#140b03"/>
    <ellipse cx="-15" cy="-65" rx="10" ry="12" fill="#1a0e05"/>
    <ellipse cx="0" cy="-70" rx="10" ry="12" fill="#1a0e05"/>
    <ellipse cx="15" cy="-65" rx="10" ry="12" fill="#1a0e05"/>

    <!-- Mud / wet impression depth shadows -->
    <path d="M-45,-100 C-52,-80 -55,-50 -55,0 C-55,40 -50,80 -35,100 C-20,115 20,115 35,100 C50,80 55,40 55,0 C55,-50 52,-80 45,-100 C30,-115 -30,-115 -45,-100 Z"
          fill="none" stroke="#2e1a08" stroke-width="6" opacity="0.4"/>

    <!-- Moisture rim - wet mud pushed up at edges -->
    <path d="M-48,-103 C-58,-80 -62,-50 -62,0 C-62,43 -56,85 -38,104 C-21,120 21,120 38,104 C56,85 62,43 62,0 C62,-50 58,-80 48,-103 C32,-120 -32,-120 -48,-103 Z"
          fill="none" stroke="#3d2212" stroke-width="5" opacity="0.6" filter="url(#softBlur)"/>
  </g>

  <!-- Subtle drips / wetness around print -->
  <g opacity="0.5" filter="url(#softBlur)">
    <circle cx="340" cy="155" r="4" fill="#1e1008"/>
    <circle cx="460" cy="160" r="3" fill="#1e1008"/>
    <circle cx="325" cy="350" r="5" fill="#1e1008"/>
    <circle cx="475" cy="340" r="3.5" fill="#1e1008"/>
    <circle cx="390" cy="370" r="4" fill="#1e1008"/>
  </g>

  <!-- Second faint old print behind (ghostly, older) -->
  <g transform="translate(395, 115)" opacity="0.2" filter="url(#softBlur)">
    <path d="M-35,-75 C-40,-60 -42,-38 -42,0 C-42,30 -38,60 -26,75 C-15,87 15,87 26,75 C38,60 42,30 42,0 C42,-38 40,-60 35,-75 C23,-87 -23,-87 -35,-75 Z"
          fill="#1a0d04"/>
    <!-- Heel cut visible even on faint print -->
    <path d="M22,52 L30,52" stroke="#3a2010" stroke-width="3"/>
  </g>

  <!-- Dark vignette edges -->
  <rect x="0" y="0" width="800" height="500" fill="none" stroke="#000000" stroke-width="0"/>
  <path d="M0,0 L800,0 L800,500 L0,500 Z" fill="radial-gradient" opacity="0"/>
  <!-- Corner darks -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#vignette)"/>
</svg>
