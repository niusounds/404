<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#0c0c0c" />
  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#1e1e1e" />
  <!-- Campfire -->
  <path d="M150 250 Q200 100 250 250 Z" fill="#e67e22" opacity="0.8">
    <animate attributeName="d" values="M150 250 Q200 100 250 250 Z;M150 250 Q200 120 250 250 Z;M150 250 Q200 100 250 250 Z" dur="0.5s" repeatCount="indefinite" />
  </path>
  <path d="M170 250 Q200 150 230 250 Z" fill="#f1c40f" opacity="0.9">
    <animate attributeName="d" values="M170 250 Q200 150 230 250 Z;M170 250 Q200 170 230 250 Z;M170 250 Q200 150 230 250 Z" dur="0.3s" repeatCount="indefinite" />
  </path>
  <!-- Smoke -->
  <path d="M190 100 Q200 50 210 100" stroke="#333" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite" />
  </path>
  <!-- Distant Figure Silhouette -->
  <circle cx="100" cy="230" r="10" fill="#000" />
  <rect x="95" y="240" width="10" height="20" fill="#000" />
  <!-- The "Observer" -->
  <circle cx="300" cy="230" r="12" fill="#000" />
  <rect x="295" y="242" width="10" height="18" fill="#000" />
  <circle cx="297" cy="228" r="2" fill="#f00" opacity="0.8">
     <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="303" cy="228" r="2" fill="#f00" opacity="0.8">
     <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>