<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="ceilLight" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#2a2520" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050407" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="figureGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#1a1510" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background: station interior -->
  <rect width="800" height="500" fill="#050407"/>

  <!-- Floor -->
  <rect x="0" y="350" width="800" height="150" fill="#0c0a10"/>
  <!-- Floor reflection lines -->
  <line x1="0" y1="360" x2="800" y2="360" stroke="#161220" stroke-width="1"/>
  <line x1="0" y1="390" x2="800" y2="390" stroke="#0f0c14" stroke-width="1"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="#0f0c14" stroke-width="1"/>

  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="80" fill="#080610"/>
  <!-- Ceiling lights - flickering -->
  <rect x="150" y="10" width="120" height="25" rx="4" fill="#c8b870" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.05;0.18;0.02;0.15" dur="4.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="530" y="10" width="120" height="25" rx="4" fill="#c8b870" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.18;0.04;0.16;0.12" dur="3.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Station walls -->
  <rect x="0" y="80" width="60" height="270" fill="#0a0812"/>
  <rect x="740" y="80" width="60" height="270" fill="#0a0812"/>

  <!-- Distant platform crowd - blurry silhouettes -->
  <ellipse cx="120" cy="340" rx="18" ry="55" fill="#0d0b13" opacity="0.6" filter="url(#softBlur)"/>
  <ellipse cx="160" cy="345" rx="15" ry="48" fill="#0d0b13" opacity="0.5" filter="url(#softBlur)"/>
  <ellipse cx="650" cy="342" rx="16" ry="52" fill="#0d0b13" opacity="0.5" filter="url(#softBlur)"/>
  <ellipse cx="690" cy="338" rx="14" ry="50" fill="#0d0b13" opacity="0.6" filter="url(#softBlur)"/>

  <!-- Ticket gate line -->
  <rect x="0" y="315" width="800" height="3" fill="#1a1525" opacity="0.8"/>

  <!-- Central figure: large looming man - foreground -->
  <!-- Body -->
  <ellipse cx="400" cy="260" rx="65" ry="120" fill="#110f18">
    <animate attributeName="rx" values="65;67;64;65" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Head -->
  <ellipse cx="400" cy="155" rx="38" ry="44" fill="#120f1a"/>
  <!-- Shoulders broad -->
  <ellipse cx="400" cy="210" rx="75" ry="30" fill="#110f18"/>
  <!-- Arms hanging -->
  <rect x="330" y="210" width="22" height="110" rx="10" fill="#0e0c16"/>
  <rect x="448" y="210" width="22" height="110" rx="10" fill="#0e0c16"/>

  <!-- Subtle glow behind figure -->
  <ellipse cx="400" cy="250" rx="100" ry="150" fill="url(#figureGlow)" opacity="0.4"/>

  <!-- Shadow cast by figure on floor -->
  <ellipse cx="400" cy="430" rx="80" ry="30" fill="#000000" opacity="0.6"/>

  <!-- Faint light illumination on figure edges -->
  <ellipse cx="400" cy="200" rx="42" ry="130" fill="none" stroke="#2a2035" stroke-width="2" opacity="0.4" filter="url(#blur)"/>

  <!-- Platform sign in background - barely visible -->
  <rect x="310" y="88" width="180" height="32" rx="3" fill="#0d0b14" opacity="0.7"/>
  <text x="400" y="110" font-family="sans-serif" font-size="13" fill="#2a2240" text-anchor="middle" opacity="0.6">赤　羽</text>

  <!-- Distant train lights -->
  <ellipse cx="400" cy="300" rx="6" ry="4" fill="#3a3050" opacity="0.3" filter="url(#blur)">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Atmospheric haze layer -->
  <rect x="0" y="0" width="800" height="500" fill="#060409" opacity="0.25"/>
</svg>
