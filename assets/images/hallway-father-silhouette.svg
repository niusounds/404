<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
    <radialGradient id="cornerGlow" cx="100%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a1a08" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#050508" stop-opacity="0"/>
    </radialGradient>
    <filter id="softEdge">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="figureBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Sky-dark background -->
  <rect width="400" height="300" fill="#05050a"/>

  <!-- Corridor ceiling -->
  <polygon points="0,0 400,0 310,60 90,60" fill="#080810"/>
  <!-- Ceiling line -->
  <line x1="90" y1="60" x2="310" y2="60" stroke="#14141e" stroke-width="1"/>

  <!-- Corridor floor -->
  <polygon points="0,300 400,300 310,180 90,180" fill="url(#floorGrad)"/>

  <!-- Left wall -->
  <polygon points="0,0 90,60 90,180 0,300" fill="#060610"/>

  <!-- Right wall -->
  <polygon points="400,0 310,60 310,180 400,300" fill="#08080e"/>

  <!-- Far wall (end of corridor) -->
  <rect x="90" y="60" width="220" height="120" fill="#06060e"/>

  <!-- Wall panel lines left -->
  <line x1="0" y1="80"  x2="90" y2="90"  stroke="#0f0f1e" stroke-width="1"/>
  <line x1="0" y1="160" x2="90" y2="150" stroke="#0f0f1e" stroke-width="1"/>
  <line x1="0" y1="210" x2="90" y2="168" stroke="#0f0f1e" stroke-width="1"/>

  <!-- Wall panel lines right -->
  <line x1="400" y1="80"  x2="310" y2="90"  stroke="#0f0f1e" stroke-width="1"/>
  <line x1="400" y1="160" x2="310" y2="150" stroke="#0f0f1e" stroke-width="1"/>
  <line x1="400" y1="210" x2="310" y2="168" stroke="#0f0f1e" stroke-width="1"/>

  <!-- Floor center line (single perspective line) -->
  <line x1="200" y1="300" x2="200" y2="180" stroke="#0a0a14" stroke-width="1"/>

  <!-- Corner turn — wall going right from far end -->
  <!-- Right turn opening at far right of corridor -->
  <polygon points="310,60 400,60 400,180 310,180" fill="#0a080a"/>
  <line x1="310" y1="60" x2="310" y2="180" stroke="#1a1020" stroke-width="2"/>

  <!-- Warm glow from the corner (light source behind/around) -->
  <rect x="290" y="60" width="110" height="120" fill="url(#cornerGlow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Father's silhouette — half disappeared around the right corner -->
  <!-- Only left portion of the figure visible, clipped by the corner -->
  <g filter="url(#figureBlur)" opacity="0.9">
    <!-- Body/torso — only left half showing -->
    <!-- Head -->
    <ellipse cx="310" cy="108" rx="12" ry="13" fill="#010105"/>
    <!-- Neck -->
    <rect x="304" y="119" width="12" height="8" fill="#010105"/>
    <!-- Shoulders (rounded — key detail) -->
    <path d="M285,127 Q292,122 304,125 Q310,124 316,125 Q322,122 328,128 L326,168 L287,168 Z" fill="#010105"/>
    <!-- Left arm (visible) -->
    <path d="M286,130 Q278,148 280,162 L290,162 Q290,148 295,132 Z" fill="#010105"/>
    <!-- Right arm disappearing past edge -->
    <path d="M316,130 Q322,148 322,162 L310,162 Z" fill="#010105"/>
    <!-- Legs -->
    <path d="M289,168 L292,190 L300,190 L302,168 Z" fill="#010105"/>
    <path d="M308,168 L308,190 L316,190 L318,168 Z" fill="#010105"/>
  </g>

  <!-- Subtle silhouette glow/outline hint -->
  <g filter="url(#softEdge)" opacity="0.15">
    <ellipse cx="310" cy="108" rx="14" ry="15" fill="#2a1808"/>
    <path d="M283,127 Q291,120 304,123 Q310,122 318,125 Q325,120 330,128 L328,170 L285,170 Z" fill="#2a1808"/>
  </g>

  <!-- Subtle floor reflection of figure -->
  <path d="M286,190 Q295,200 307,200 Q316,200 320,192 L320,210 Q312,218 296,218 Q282,218 280,210 Z"
        fill="#010105" opacity="0.3"/>

  <!-- Darkened vignette edges -->
  <rect x="0" y="0" width="80" height="300" fill="black" opacity="0.5"/>
  <rect x="320" y="0" width="80" height="300" fill="black" opacity="0.3"/>
  <rect x="0" y="0" width="400" height="50" fill="black" opacity="0.4"/>
  <rect x="0" y="250" width="400" height="50" fill="black" opacity="0.5"/>
</svg>
