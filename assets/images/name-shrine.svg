<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="toriiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a1a1a"/>
      <stop offset="100%" stop-color="#3a0a0a"/>
    </linearGradient>
  </defs>
  
  <!-- Night sky background -->
  <rect width="400" height="300" fill="#05050a"/>
  
  <!-- Fog at bottom -->
  <ellipse cx="200" cy="320" rx="250" ry="80" fill="#1a1a2a" opacity="0.3"/>
  
  <!-- Old torii gate -->
  <rect x="70" y="100" width="20" height="180" fill="url(#toriiGrad)"/>
  <rect x="310" y="100" width="20" height="180" fill="url(#toriiGrad)"/>
  <rect x="50" y="90" width="300" height="15" fill="url(#toriiGrad)" rx="2"/>
  <rect x="65" y="130" width="270" height="8" fill="url(#toriiGrad)"/>
  
  <!-- Worn text on torii - unreadable -->
  <text x="200" y="105" text-anchor="middle" font-family="serif" font-size="10" fill="#2a1515" opacity="0.4">
    ■■■■神社
  </text>
  
  <!-- Stone path -->
  <rect x="170" y="250" width="60" height="10" fill="#2a2a2a" rx="1"/>
  <rect x="175" y="265" width="50" height="8" fill="#252525" rx="1"/>
  <rect x="180" y="278" width="40" height="6" fill="#202020" rx="1"/>
  
  <!-- Ominous floating orbs (hitodama) -->
  <circle cx="120" cy="180" r="8" fill="#4a7a9a" filter="url(#glow)" opacity="0.6">
    <animate attributeName="cy" values="180;170;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="160" r="6" fill="#4a7a9a" filter="url(#glow)" opacity="0.5">
    <animate attributeName="cy" values="160;150;160" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="10" fill="#5a8aaa" filter="url(#glow)" opacity="0.4">
    <animate attributeName="cy" values="200;185;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Paper strips (shide) moving unnaturally -->
  <path d="M85 95 L82 110 L88 112 L85 125 L91 127 L88 140" fill="none" stroke="#d0d0c0" stroke-width="1" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="0 85 95;5 85 95;-3 85 95;0 85 95" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M315 95 L318 110 L312 112 L315 125 L309 127 L312 140" fill="none" stroke="#d0d0c0" stroke-width="1" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="0 315 95;-5 315 95;3 315 95;0 315 95" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Dark figure beyond the gate -->
  <ellipse cx="200" cy="240" rx="15" ry="25" fill="#0a0a0f" opacity="0.8"/>
  <circle cx="200" cy="220" r="10" fill="#050508"/>
  
  <!-- Eyes of figure -->
  <circle cx="196" cy="218" r="2" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="204" cy="218" r="2" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>
