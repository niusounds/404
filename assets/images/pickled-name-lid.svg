<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">木桶の蓋</title>
  <desc id="desc">暗い蔵の木桶の蓋に不自然な叩き跡が現れる。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0a10"/>
      <stop offset="100%" stop-color="#07070c"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b4637"/>
      <stop offset="100%" stop-color="#2e221b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg2)"/>
  <ellipse cx="600" cy="390" rx="360" ry="170" fill="#18151d"/>
  <ellipse cx="600" cy="380" rx="330" ry="145" fill="url(#wood)" stroke="#7a6250" stroke-width="3"/>

  <g opacity="0.3" stroke="#1a1410" stroke-width="2">
    <path d="M300 350 C 450 320, 750 320, 900 350" fill="none"/>
    <path d="M290 390 C 460 360, 740 360, 910 390" fill="none"/>
    <path d="M310 430 C 470 400, 730 400, 890 430" fill="none"/>
  </g>

  <g fill="#b8d3bc" opacity="0.7">
    <circle cx="520" cy="365" r="8">
      <animate attributeName="r" values="7;11;7" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="355" r="8">
      <animate attributeName="r" values="7;11;7" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="365" r="8">
      <animate attributeName="r" values="7;11;7" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <ellipse cx="600" cy="600" rx="280" ry="40" fill="#0d0b11" opacity="0.8"/>
</svg>
