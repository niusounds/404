<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="roomGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#06050a"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="tinyBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#roomGlow)"/>

  <!-- Overhead warm lighting -->
  <ellipse cx="400" cy="30" rx="220" ry="40" fill="#c8a050" opacity="0.12" filter="url(#softBlur)"/>
  <rect x="280" y="5" width="240" height="10" rx="3" fill="#d4aa55" opacity="0.35"/>

  <!-- Long table -->
  <ellipse cx="400" cy="300" rx="310" ry="28" fill="#1a1408"/>
  <ellipse cx="400" cy="296" rx="310" ry="24" fill="#221a0c"/>
  <!-- Table surface highlight -->
  <ellipse cx="400" cy="290" rx="290" ry="18" fill="#2a2010" opacity="0.7"/>
  <ellipse cx="400" cy="288" rx="200" ry="8" fill="#3a2e15" opacity="0.4"/>

  <!-- Table legs -->
  <rect x="130" y="305" width="10" height="70" fill="#1a1408"/>
  <rect x="660" y="305" width="10" height="70" fill="#1a1408"/>

  <!-- 6 place settings evenly spaced — all identical -->
  <!-- Each: bowl, chopsticks, glass -->
  <!-- Person 1 (far left) -->
  <ellipse cx="115" cy="285" rx="22" ry="12" fill="#2a1e0c"/>
  <ellipse cx="115" cy="283" rx="20" ry="10" fill="#3a2810" opacity="0.9"/>
  <!-- Soup in bowl -->
  <ellipse cx="115" cy="282" rx="17" ry="8" fill="#1e3020" opacity="0.8"/>
  <!-- Chopsticks -->
  <rect x="92" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,93,286)"/>
  <rect x="96" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,97,286)"/>
  <!-- Glass -->
  <rect x="137" y="275" width="10" height="15" rx="2" fill="#1a2a2a" opacity="0.7"/>
  <rect x="138" y="276" width="8" height="10" rx="1" fill="#203030" opacity="0.5"/>

  <!-- Person 2 -->
  <ellipse cx="240" cy="285" rx="22" ry="12" fill="#2a1e0c"/>
  <ellipse cx="240" cy="283" rx="20" ry="10" fill="#3a2810" opacity="0.9"/>
  <ellipse cx="240" cy="282" rx="17" ry="8" fill="#1e3020" opacity="0.8"/>
  <rect x="217" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,218,286)"/>
  <rect x="221" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,222,286)"/>
  <rect x="262" y="275" width="10" height="15" rx="2" fill="#1a2a2a" opacity="0.7"/>
  <rect x="263" y="276" width="8" height="10" rx="1" fill="#203030" opacity="0.5"/>

  <!-- Person 3 -->
  <ellipse cx="365" cy="285" rx="22" ry="12" fill="#2a1e0c"/>
  <ellipse cx="365" cy="283" rx="20" ry="10" fill="#3a2810" opacity="0.9"/>
  <ellipse cx="365" cy="282" rx="17" ry="8" fill="#1e3020" opacity="0.8"/>
  <rect x="342" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,343,286)"/>
  <rect x="346" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,347,286)"/>
  <rect x="387" y="275" width="10" height="15" rx="2" fill="#1a2a2a" opacity="0.7"/>
  <rect x="388" y="276" width="8" height="10" rx="1" fill="#203030" opacity="0.5"/>

  <!-- Person 4 -->
  <ellipse cx="490" cy="285" rx="22" ry="12" fill="#2a1e0c"/>
  <ellipse cx="490" cy="283" rx="20" ry="10" fill="#3a2810" opacity="0.9"/>
  <ellipse cx="490" cy="282" rx="17" ry="8" fill="#1e3020" opacity="0.8"/>
  <rect x="467" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,468,286)"/>
  <rect x="471" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,472,286)"/>
  <rect x="512" y="275" width="10" height="15" rx="2" fill="#1a2a2a" opacity="0.7"/>
  <rect x="513" y="276" width="8" height="10" rx="1" fill="#203030" opacity="0.5"/>

  <!-- Person 5 -->
  <ellipse cx="615" cy="285" rx="22" ry="12" fill="#2a1e0c"/>
  <ellipse cx="615" cy="283" rx="20" ry="10" fill="#3a2810" opacity="0.9"/>
  <ellipse cx="615" cy="282" rx="17" ry="8" fill="#1e3020" opacity="0.8"/>
  <rect x="592" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,593,286)"/>
  <rect x="596" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,597,286)"/>
  <rect x="637" y="275" width="10" height="15" rx="2" fill="#1a2a2a" opacity="0.7"/>
  <rect x="638" y="276" width="8" height="10" rx="1" fill="#203030" opacity="0.5"/>

  <!-- Person 6 (far right) -->
  <ellipse cx="690" cy="285" rx="22" ry="12" fill="#2a1e0c"/>
  <ellipse cx="690" cy="283" rx="20" ry="10" fill="#3a2810" opacity="0.9"/>
  <ellipse cx="690" cy="282" rx="17" ry="8" fill="#1e3020" opacity="0.8"/>
  <rect x="667" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,668,286)"/>
  <rect x="671" y="272" width="2" height="28" rx="1" fill="#5a3a1a" transform="rotate(-5,672,286)"/>
  <rect x="712" y="275" width="10" height="15" rx="2" fill="#1a2a2a" opacity="0.7"/>
  <rect x="713" y="276" width="8" height="10" rx="1" fill="#203030" opacity="0.5"/>

  <!-- Seated silhouettes above table (heads and shoulders) -->
  <!-- All at exact same height, same posture -->
  <g opacity="0.9">
    <!-- Person 1 -->
    <ellipse cx="115" cy="210" rx="16" ry="17" fill="#0c1008"/>
    <path d="M 93 228 Q 93 270 137 270 Q 137 228 137 228 Z" fill="#0c1008"/>
    <!-- Arms forward on table (eating pose) -->
    <line x1="93" y1="250" x2="104" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
    <line x1="137" y1="250" x2="126" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>

    <!-- Person 2 -->
    <ellipse cx="240" cy="210" rx="16" ry="17" fill="#0c1008"/>
    <path d="M 218 228 Q 218 270 262 270 Q 262 228 262 228 Z" fill="#0c1008"/>
    <line x1="218" y1="250" x2="229" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
    <line x1="262" y1="250" x2="251" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>

    <!-- Person 3 -->
    <ellipse cx="365" cy="210" rx="16" ry="17" fill="#0c1008"/>
    <path d="M 343 228 Q 343 270 387 270 Q 387 228 387 228 Z" fill="#0c1008"/>
    <line x1="343" y1="250" x2="354" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
    <line x1="387" y1="250" x2="376" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>

    <!-- Person 4 -->
    <ellipse cx="490" cy="210" rx="16" ry="17" fill="#0c1008"/>
    <path d="M 468 228 Q 468 270 512 270 Q 512 228 512 228 Z" fill="#0c1008"/>
    <line x1="468" y1="250" x2="479" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
    <line x1="512" y1="250" x2="501" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>

    <!-- Person 5 -->
    <ellipse cx="615" cy="210" rx="16" ry="17" fill="#0c1008"/>
    <path d="M 593 228 Q 593 270 637 270 Q 637 228 637 228 Z" fill="#0c1008"/>
    <line x1="593" y1="250" x2="604" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
    <line x1="637" y1="250" x2="626" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>

    <!-- Person 6 -->
    <ellipse cx="690" cy="210" rx="16" ry="17" fill="#0c1008"/>
    <path d="M 668 228 Q 668 270 712 270 Q 712 228 712 228 Z" fill="#0c1008"/>
    <line x1="668" y1="250" x2="679" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
    <line x1="712" y1="250" x2="701" y2="272" stroke="#0c1008" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Subtle smiles on silhouettes — tiny white curves -->
  <path d="M 110 218 Q 115 222 120 218" stroke="#2a3a2a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 235 218 Q 240 222 245 218" stroke="#2a3a2a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 360 218 Q 365 222 370 218" stroke="#2a3a2a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 485 218 Q 490 222 495 218" stroke="#2a3a2a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 610 218 Q 615 222 620 218" stroke="#2a3a2a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 685 218 Q 690 222 695 218" stroke="#2a3a2a" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Faint animated pulse on one bowl — wrong -->
  <ellipse cx="365" cy="282" rx="17" ry="8" fill="#3a5030" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0;0.2;0" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <text x="400" y="430" font-family="monospace" font-size="10" fill="#3a2a10" text-anchor="middle" opacity="0.6">いつも同じ席　いつも同じ料理　いつも同じ笑顔</text>
</svg>
