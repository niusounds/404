<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#1a1a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#05050a;stop-opacity:1" />
    </radialGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="450" fill="url(#grad1)" />
  
  <!-- 電車の窓枠の影 -->
  <path d="M100 50 L700 50 L700 300 L100 300 Z" fill="none" stroke="#222" stroke-width="2" />
  <line x1="400" y1="50" x2="400" y2="300" stroke="#222" stroke-width="2" />
  
  <!-- 揺れるライトの光 -->
  <circle cx="400" cy="50" r="150" fill="#ffffff" fill-opacity="0.03" filter="url(#f1)">
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="4s" repeatCount="indefinite" />
    <animate attributeName="cx" values="390;410;390" dur="5s" repeatCount="indefinite" />
  </circle>
  
  <!-- 巨大な男のシルエット -->
  <path d="M450 450 Q480 200 500 100 Q520 50 550 50 Q580 50 600 100 Q620 200 650 450 Z" fill="#000" fill-opacity="0.9">
    <animate attributeName="d" values="M450 450 Q480 200 500 100 Q520 50 550 50 Q580 50 600 100 Q620 200 650 450 Z;M452 450 Q482 202 502 102 Q522 52 552 52 Q582 52 602 102 Q622 202 652 450 Z;M450 450 Q480 200 500 100 Q520 50 550 50 Q580 50 600 100 Q620 200 650 450 Z" dur="3s" repeatCount="indefinite" />
  </path>
  
  <!-- 男の不気味な目 -->
  <circle cx="530" cy="110" r="3" fill="#ffffff" fill-opacity="0.3">
     <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="570" cy="110" r="3" fill="#ffffff" fill-opacity="0.3">
     <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- 手元の聖書（影） -->
  <rect x="520" y="250" width="60" height="80" fill="#050505" stroke="#111" />
  
  <!-- ノイズ（不安感の演出） -->
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
  </filter>
  <rect width="800" height="450" filter="url(#noiseFilter)" opacity="0.05" pointer-events="none" />
</svg>
