<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="40%" stop-color="#060505"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="voidGlow" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#1a0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ghostBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" y="0" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="url(#bgGrad)"/>
  <rect width="800" height="380" fill="url(#voidGlow)"/>
  <rect width="800" height="380" fill="url(#scanlines)" opacity="0.5"/>

  <!-- Terminal window frame -->
  <rect x="70" y="18" width="650" height="132" rx="5" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="70" y="18" width="650" height="26" rx="5" fill="#141414"/>
  <rect x="70" y="33" width="650" height="11" fill="#141414"/>
  <!-- Traffic light buttons -->
  <circle cx="93" cy="31" r="5" fill="#3a0000"/>
  <circle cx="113" cy="31" r="5" fill="#2a2000"/>
  <circle cx="133" cy="31" r="5" fill="#002500"/>
  <!-- Window title -->
  <text x="395" y="35" font-family="monospace" font-size="10" fill="#333" text-anchor="middle">HTTP ─ 404</text>

  <!-- HTTP response line with flicker -->
  <text x="100" y="74" font-family="monospace" font-size="13.5" fill="#8b0000">HTTP/1.1 404 Not Found
    <animate attributeName="opacity"
             values="1;1;0.3;1;1;0.5;1;1;0.15;1"
             keyTimes="0;0.80;0.82;0.84;0.90;0.92;0.94;0.97;0.98;1"
             dur="6s" repeatCount="indefinite"/>
  </text>
  <!-- Response headers -->
  <text x="100" y="96" font-family="monospace" font-size="11.5" fill="#2e2e2e">Content-Type: text/void</text>
  <!-- Censored header -->
  <text x="100" y="118" font-family="monospace" font-size="11.5" fill="#2e2e2e">X-Erased-Reason: </text>
  <rect x="272" y="107" width="170" height="14" rx="2" fill="#1a1a1a"/>
  <!-- Content-Length -->
  <text x="100" y="138" font-family="monospace" font-size="11" fill="#1f1f1f">Content-Length: 0</text>
  <!-- Blinking cursor -->
  <rect x="224" y="128" width="8" height="12" fill="#2a2a2a">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Divider — void begins here -->
  <line x1="0" y1="166" x2="800" y2="166" stroke="#3a0000" stroke-width="0.5">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Falling data fragment 1: deleted memory path -->
  <text x="90" y="178" font-family="monospace" font-size="9" fill="#282020">
    /deleted/memory_
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,205" dur="7s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.4;0.2;0" keyTimes="0;0.15;0.6;0.85;1" dur="7s" begin="0s" repeatCount="indefinite"/>
  </text>

  <!-- Falling data fragment 2: GET request -->
  <text x="390" y="188" font-family="monospace" font-size="9" fill="#1e1e2a">
    GET /████ HTTP/1.1
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,193" dur="8.5s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0.35;0.2;0" keyTimes="0;0.1;0.65;0.9;1" dur="8.5s" begin="1.2s" repeatCount="indefinite"/>
  </text>

  <!-- Falling data fragment 3: error message -->
  <text x="540" y="200" font-family="monospace" font-size="8.5" fill="#251515">
    Error: null reference
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,181" dur="6.8s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.35;0.25;0" keyTimes="0;0.2;0.75;1" dur="6.8s" begin="2.5s" repeatCount="indefinite"/>
  </text>

  <!-- Falling data fragment 4: repeated 404 -->
  <text x="210" y="182" font-family="monospace" font-size="9" fill="#201818">
    404 · 404 · 404 · 404
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,199" dur="9s" begin="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.2;0" keyTimes="0;0.15;0.8;1" dur="9s" begin="3.8s" repeatCount="indefinite"/>
  </text>

  <!-- Falling data fragment 5: Japanese -->
  <text x="430" y="218" font-family="serif" font-size="9" fill="#251a1a">
    あなたも、見つかりません
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,163" dur="10s" begin="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.25;0" keyTimes="0;0.2;0.8;1" dur="10s" begin="4.5s" repeatCount="indefinite"/>
  </text>

  <!-- Falling data fragment 6: erased URL -->
  <text x="150" y="196" font-family="monospace" font-size="8" fill="#1a1528">
    https://███.███/███/██
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,185" dur="7.5s" begin="5.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0.2;0" keyTimes="0;0.2;0.75;1" dur="7.5s" begin="5.8s" repeatCount="indefinite"/>
  </text>

  <!-- Small data rain drops -->
  <g fill="#350000">
    <rect x="160" y="175" width="1" height="4">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,205" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" keyTimes="0;0.5;1" dur="3s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="310" y="175" width="1" height="4">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,205" dur="4.2s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.5;1" dur="4.2s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="480" y="175" width="1" height="4">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,205" dur="3.7s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.5;1" dur="3.7s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="620" y="175" width="1" height="3">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,205" dur="5s" begin="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" keyTimes="0;0.5;1" dur="5s" begin="2.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="720" y="175" width="1" height="4">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,205" dur="4s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.5;1" dur="4s" begin="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Ghostly hand rising from the void -->
  <g filter="url(#ghostBlur)">
    <animate attributeName="opacity" values="0;0;0.35;0.2;0.4;0.1;0"
             keyTimes="0;0.2;0.4;0.55;0.7;0.85;1"
             dur="12s" repeatCount="indefinite"/>
    <!-- Palm silhouette -->
    <path d="M342 382 C342 370 340 355 345 340 C350 325 360 322 370 322 C380 322 390 325 395 340 C400 355 398 370 398 382 Z"
          fill="#0e0e0e" stroke="#1e1e1e" stroke-width="0.5"/>
    <!-- Thumb -->
    <path d="M345 360 C338 350 335 338 338 328 C341 318 350 316 354 325 C357 332 352 345 352 355"
          fill="none" stroke="#1d1d1d" stroke-width="1.8"/>
    <!-- Index finger -->
    <path d="M356 338 C354 325 353 308 358 295 C362 283 372 281 375 293 C378 305 375 322 373 338"
          fill="none" stroke="#1d1d1d" stroke-width="1.8"/>
    <!-- Middle finger -->
    <path d="M370 336 C369 322 368 304 373 290 C377 276 388 274 391 287 C394 300 390 320 389 336"
          fill="none" stroke="#1d1d1d" stroke-width="1.8"/>
    <!-- Ring finger -->
    <path d="M385 340 C385 326 385 310 389 297 C393 285 403 284 406 296 C409 308 405 326 403 340"
          fill="none" stroke="#1b1b1b" stroke-width="1.8"/>
    <!-- Pinky -->
    <path d="M398 348 C399 336 401 322 404 312 C407 303 414 302 416 312 C418 322 414 338 412 348"
          fill="none" stroke="#191919" stroke-width="1.5"/>
  </g>

  <!-- "見つかりません" text in the depths -->
  <text x="400" y="318" text-anchor="middle" font-family="serif" font-size="18"
        fill="#4a0000" filter="url(#textGlow)" letter-spacing="6">見つかりません
    <animate attributeName="opacity"
             values="0;0;0.55;0.35;0.45;0;0"
             keyTimes="0;0.25;0.45;0.6;0.75;0.9;1"
             dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom fade to pure black -->
  <rect x="0" y="280" width="800" height="100" fill="url(#bottomFade)"/>
</svg>
