<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur-wave">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="deep-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c8a0" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#007a5a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#001a10" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deep-light2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0e0ff" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#2080c0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#001020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1820"/>
      <stop offset="100%" stop-color="#020a10"/>
    </linearGradient>
    <clipPath id="water-clip">
      <rect x="0" y="0" width="800" height="450"/>
    </clipPath>
  </defs>

  <!-- Deep water background -->
  <rect width="800" height="450" fill="url(#water-grad)"/>

  <!-- Water surface ripples at top -->
  <g opacity="0.4" filter="url(#blur-wave)">
    <path d="M0 30 Q100 20 200 35 Q300 50 400 30 Q500 10 600 35 Q700 55 800 30" fill="none" stroke="#1a3a50" stroke-width="2"/>
    <path d="M0 55 Q150 40 300 60 Q450 80 600 55 Q700 40 800 55" fill="none" stroke="#1a3a50" stroke-width="1.5"/>
  </g>

  <!-- Surface water sheen -->
  <rect x="0" y="0" width="800" height="60" fill="#0d2030" opacity="0.8"/>
  <rect x="0" y="55" width="800" height="8" fill="#1e4060" opacity="0.3"/>

  <!-- Main deep glow - pulsing -->
  <ellipse cx="400" cy="260" rx="180" ry="90" fill="url(#deep-light)">
    <animate attributeName="rx" values="180;220;180" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="90;110;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1.0;0.7" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Secondary blue glow -->
  <ellipse cx="380" cy="240" rx="120" ry="60" fill="url(#deep-light2)">
    <animate attributeName="cx" values="380;420;380" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Core bright spot -->
  <ellipse cx="400" cy="255" rx="40" ry="25" fill="#60ffcc" opacity="0.3" filter="url(#glow-strong)">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="25;35;25" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Smaller scattered lights -->
  <g filter="url(#glow-soft)">
    <circle cx="220" cy="320" r="8" fill="#00d4a0" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="580" cy="300" r="10" fill="#00c8e0" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="7s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="310" cy="380" r="6" fill="#80ffcc" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="530" cy="390" r="7" fill="#40d0ff" opacity="0.25">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="6s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="150" cy="250" r="5" fill="#00e0a0" opacity="0.2">
      <animate attributeName="opacity" values="0;0.35;0" dur="8s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="650" cy="350" r="9" fill="#20c8e0" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.45;0.1" dur="5.5s" repeatCount="indefinite" begin="4s"/>
    </circle>
  </g>

  <!-- Light refraction lines rising toward surface -->
  <g opacity="0.12" filter="url(#blur-wave)">
    <line x1="380" y1="255" x2="350" y2="30" stroke="#80ffcc" stroke-width="1.5">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="410" y1="250" x2="440" y2="20" stroke="#80ffcc" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="395" y1="260" x2="390" y2="10" stroke="#a0ffee" stroke-width="1.2">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="5s" repeatCount="indefinite" begin="1s"/>
    </line>
  </g>

  <!-- Dark shapes deep in the water - ambiguous silhouettes -->
  <g opacity="0.25">
    <ellipse cx="400" cy="350" rx="60" ry="20" fill="#001a10" filter="url(#blur-wave)"/>
    <ellipse cx="350" cy="330" rx="30" ry="10" fill="#001a10" filter="url(#blur-wave)"/>
    <ellipse cx="450" cy="340" rx="25" ry="8" fill="#001a10" filter="url(#blur-wave)"/>
  </g>

  <!-- Very subtle humanoid shape deep below center light -->
  <g opacity="0.15" filter="url(#blur-wave)">
    <ellipse cx="400" cy="310" rx="12" ry="16" fill="#003020"/>
    <rect x="392" y="326" width="16" height="35" fill="#003020" rx="3"/>
    <rect x="378" y="330" width="10" height="28" fill="#003020" rx="3" transform="rotate(-15 383 330)"/>
    <rect x="412" y="330" width="10" height="28" fill="#003020" rx="3" transform="rotate(15 417 330)"/>
  </g>

  <!-- Water surface overlay (view from below) -->
  <rect x="0" y="0" width="800" height="65" fill="#0a1820" opacity="0.6"/>
  <path d="M0 65 Q200 50 400 65 Q600 80 800 65 L800 0 L0 0 Z" fill="#0d2030" opacity="0.5"/>

  <!-- Moonlight shimmer on surface from below -->
  <ellipse cx="400" cy="35" rx="80" ry="15" fill="#c8d8e0" opacity="0.06" filter="url(#glow-soft)">
    <animate attributeName="opacity" values="0.04;0.1;0.04" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>
