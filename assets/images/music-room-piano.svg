<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="roomLight" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#1a1408" stop-opacity="1"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a3020" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0808" stop-opacity="0"/>
    </radialGradient>
    <filter id="dusty">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#roomLight)"/>

  <!-- Floor -->
  <rect x="0" y="370" width="800" height="130" fill="#0d0c09"/>
  <!-- Floor boards -->
  <line x1="0" y1="390" x2="800" y2="390" stroke="#1a1815" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="415" x2="800" y2="415" stroke="#1a1815" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="#1a1815" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="465" x2="800" y2="465" stroke="#1a1815" stroke-width="1" opacity="0.5"/>
  <!-- One suspicious loose floorboard -->
  <rect x="80" y="371" width="60" height="24" fill="#131210" stroke="#2a2620" stroke-width="1"/>
  <line x1="80" y1="383" x2="140" y2="383" stroke="#2a2620" stroke-width="0.5"/>

  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="380" fill="#080807"/>

  <!-- Window - broken, letting in dim light -->
  <rect x="310" y="40" width="180" height="230" fill="#0d1015" stroke="#1a1a20" stroke-width="3"/>
  <rect x="310" y="40" width="180" height="230" fill="url(#windowGlow)"/>
  <!-- Cracked glass lines -->
  <line x1="400" y1="40" x2="370" y2="200" stroke="#1e2030" stroke-width="1"/>
  <line x1="400" y1="40" x2="440" y2="160" stroke="#1e2030" stroke-width="1"/>
  <line x1="370" y1="200" x2="310" y2="270" stroke="#1e2030" stroke-width="1"/>
  <line x1="440" y1="160" x2="490" y2="270" stroke="#1e2030" stroke-width="1"/>
  <!-- Window frame -->
  <line x1="400" y1="40" x2="400" y2="270" stroke="#1a1a20" stroke-width="2"/>
  <line x1="310" y1="155" x2="490" y2="155" stroke="#1a1a20" stroke-width="2"/>

  <!-- Faint exterior light from window -->
  <ellipse cx="400" cy="155" rx="80" ry="100" fill="#c8b060" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Wall stains / peeling -->
  <rect x="0" y="0" width="800" height="380" fill="#05050a" opacity="0.3"/>
  <ellipse cx="150" cy="200" rx="60" ry="40" fill="#0a0a0d" opacity="0.4"/>
  <ellipse cx="650" cy="150" rx="70" ry="50" fill="#0a0a0d" opacity="0.3"/>

  <!-- Piano body (upright grand) -->
  <rect x="120" y="200" width="220" height="170" fill="#0e0e0e" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Piano top lid - slightly open -->
  <polygon points="120,200 340,200 340,185 150,175" fill="#161616" stroke="#222" stroke-width="1"/>
  <!-- Piano keys visible -->
  <rect x="130" y="310" width="200" height="30" fill="#181818" stroke="#222" stroke-width="1"/>
  <!-- White keys -->
  <rect x="133" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="147" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="161" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="175" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="189" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="203" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="217" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="231" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="245" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="259" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="273" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="287" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <rect x="301" y="313" width="12" height="24" fill="#d8d0b8" opacity="0.7"/>
  <!-- Black keys -->
  <rect x="143" y="313" width="8" height="16" fill="#0a0a0a"/>
  <rect x="157" y="313" width="8" height="16" fill="#0a0a0a"/>
  <rect x="185" y="313" width="8" height="16" fill="#0a0a0a"/>
  <rect x="199" y="313" width="8" height="16" fill="#0a0a0a"/>
  <rect x="213" y="313" width="8" height="16" fill="#0a0a0a"/>
  <rect x="241" y="313" width="8" height="16" fill="#0a0a0a"/>
  <rect x="255" y="313" width="8" height="16" fill="#0a0a0a"/>
  <!-- Piano dust on keys -->
  <rect x="130" y="313" width="200" height="6" fill="#1a1810" opacity="0.5"/>
  <!-- One key slightly depressed -->
  <rect x="217" y="316" width="12" height="21" fill="#c8c0a0" opacity="0.8"/>

  <!-- Piano lid open - dark interior hints -->
  <rect x="130" y="176" width="200" height="25" fill="#090909" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Bench in front of piano -->
  <rect x="130" y="360" width="180" height="12" fill="#0d0d0d" stroke="#1a1a18" stroke-width="1"/>
  <rect x="145" y="372" width="10" height="18" fill="#0d0d0d"/>
  <rect x="285" y="372" width="10" height="18" fill="#0d0d0d"/>

  <!-- Blackboard on right wall -->
  <rect x="550" y="80" width="220" height="140" fill="#0a100e" stroke="#1a2020" stroke-width="2"/>
  <!-- Chalk marks - partial illegible text -->
  <text x="565" y="115" font-family="serif" font-size="12" fill="#3a4040" opacity="0.6" transform="rotate(-1, 565, 115)">松田　野上　田</text>
  <text x="565" y="135" font-family="serif" font-size="12" fill="#3a4040" opacity="0.5" transform="rotate(0.5, 565, 135)">川本　横井　</text>
  <text x="565" y="155" font-family="serif" font-size="12" fill="#2a3030" opacity="0.4">小林　　　　宮</text>
  <text x="565" y="175" font-family="serif" font-size="11" fill="#2a3030" opacity="0.3" transform="rotate(-0.5, 565, 175)">________________</text>
  <text x="565" y="200" font-family="serif" font-size="13" fill="#3a4040" opacity="0.5">田中　　広</text>

  <!-- Blackboard chalk glow pulse -->
  <rect x="550" y="80" width="220" height="140" fill="#00ff88" opacity="0">
    <animate attributeName="opacity" values="0;0.01;0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating dust particles -->
  <circle cx="200" cy="100" r="1" fill="#3a3020" opacity="0.4">
    <animate attributeName="cy" values="100;90;100" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="150" r="1.5" fill="#3a3020" opacity="0.3">
    <animate attributeName="cy" values="150;135;150" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="250" r="1" fill="#3a3020" opacity="0.3">
    <animate attributeName="cy" values="250;240;250" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="320" r="1" fill="#3a3020" opacity="0.2">
    <animate attributeName="cy" values="320;305;320" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Shadow figure suggestion in window reflection - very subtle -->
  <ellipse cx="400" cy="230" rx="18" ry="30" fill="#040408" opacity="0.5"/>
  <ellipse cx="400" cy="200" rx="10" ry="12" fill="#040408" opacity="0.4"/>

  <!-- Eerie vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#vignette)"/>
</svg>
