<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  
  <!-- Desk surface -->
  <rect x="0" y="450" width="800" height="150" fill="#1a1a1a"/>
  
  <!-- Monitor stand -->
  <rect x="350" y="420" width="100" height="30" fill="#2a2a2a"/>
  <rect x="370" y="400" width="60" height="20" fill="#2a2a2a"/>
  
  <!-- Monitor frame -->
  <rect x="150" y="150" width="500" height="300" fill="#1a1a1a" stroke="#333333" stroke-width="8"/>
  
  <!-- Screen with glow -->
  <rect x="170" y="170" width="460" height="260" fill="url(#screenGlow)"/>
  
  <!-- Text cursor blinking -->
  <rect x="200" y="200" width="3" height="20" fill="#4a9eff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Some code-like text on screen -->
  <text x="210" y="215" font-family="monospace" font-size="14" fill="#4a9eff" opacity="0.6">お困りですか？</text>
  <text x="210" y="240" font-family="monospace" font-size="14" fill="#4a9eff" opacity="0.4">お手伝いしましょうか？</text>
  
  <!-- Keyboard suggestion -->
  <rect x="200" y="480" width="400" height="80" fill="#151515" rx="5"/>
  <g opacity="0.7">
    <rect x="220" y="500" width="30" height="30" fill="#2a2a2a" rx="3"/>
    <rect x="255" y="500" width="30" height="30" fill="#2a2a2a" rx="3"/>
    <rect x="290" y="500" width="30" height="30" fill="#2a2a2a" rx="3"/>
    <rect x="325" y="500" width="30" height="30" fill="#2a2a2a" rx="3"/>
    <rect x="360" y="500" width="30" height="30" fill="#2a2a2a" rx="3"/>
  </g>
  
  <!-- Coffee cup steam -->
  <ellipse cx="680" cy="520" rx="25" ry="35" fill="#3a2a1a"/>
  <ellipse cx="680" cy="515" rx="22" ry="5" fill="#4a3a2a"/>
  <path d="M 665 480 Q 660 460 665 440" stroke="#888888" stroke-width="1.5" fill="none" opacity="0.6">
    <animate attributeName="d" values="M 665 480 Q 660 460 665 440; M 665 480 Q 670 460 665 440; M 665 480 Q 660 460 665 440" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 680 480 Q 675 460 680 440" stroke="#888888" stroke-width="1.5" fill="none" opacity="0.6">
    <animate attributeName="d" values="M 680 480 Q 675 460 680 440; M 680 480 Q 685 460 680 440; M 680 480 Q 675 460 680 440" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3.2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Ambient light flickering -->
  <rect x="0" y="0" width="800" height="600" fill="#4a9eff" opacity="0.02">
    <animate attributeName="opacity" values="0.02;0.05;0.02" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
